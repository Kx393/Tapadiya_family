<style>
/* --- CORE STYLES (DARK & LIGHT) --- */
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#080a0f;--surface:#151822;--surface2:#1e2230;--surface3:#282d3e;--border:#2a3040;--border2:#3d455c;--text:#f0ede8;--text2:#a09a90;--text3:#5a5650;--gold:#c9a96e;--gold2:#e8c98a;--gold-soft:rgba(201,169,110,0.12);--canvas-filter:none}
body.theme-light{--bg:#f9f8f6;--surface:#ffffff;--surface2:#f0edea;--surface3:#e6e2dd;--border:#e0ddd9;--border2:#d0cdc9;--text:#2a2825;--text2:#4a4845;--text3:#7a7875;--gold:#b38b4d;--gold2:#967035;--gold-soft:rgba(179,139,77,0.15);--canvas-filter:invert(1) hue-rotate(180deg) opacity(0.3)}

/* --- MINIMALIST VINTAGE THEME --- */
body.theme-vintage{--bg:#f4ece2;--surface:#fff9f0;--surface2:#ebdcc4;--surface3:#e3cca6;--border:#c29b62;--border2:rgba(184,134,11,0.3);--text:#2c1e16;--text2:#543a28;--text3:#8a6a4b;--gold:#b8860b;--gold2:#8b6508;--gold-soft:rgba(184,134,11,0.15);--canvas-filter:sepia(0.3) contrast(0.9)}

html,body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;position:relative;overflow-x:hidden;transition:background 0.3s,color 0.3s}.lang-hi *{font-family:'Noto Sans Devanagari',sans-serif}

/* BACKGROUND ORBS */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;filter:var(--canvas-filter);transition:opacity 0.5s}.bg-canvas::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(201,169,110,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(120,100,200,0.06) 0%,transparent 60%);animation:bgP 12s ease-in-out infinite alternate}.bg-canvas::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(201,169,110,0.15) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);opacity:.3;animation:gD 20s linear infinite}@keyframes bgP{0%{opacity:.7}100%{opacity:1}}@keyframes gD{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:oF linear infinite;opacity:.4}.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(201,169,110,0.2),transparent 70%);top:-100px;left:-100px;animation-duration:25s}.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(100,80,180,0.15),transparent 70%);bottom:10%;right:-50px;animation-duration:30s;animation-delay:-10s}.orb3{width:200px;height:200px;background:radial-gradient(circle,rgba(201,169,110,0.12),transparent 70%);top:50%;left:60%;animation-duration:20s;animation-delay:-5s}@keyframes oF{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.1)}66%{transform:translate(-20px,30px) scale(0.9)}}

/* ABSOLUTE BACKGROUND CONTAINERS */
.custom-bg{position:absolute;top:0;left:0;right:0;bottom:0;min-height:100vh;z-index:0;opacity:0;transition:opacity 0.5s;pointer-events:none;overflow:hidden}.custom-bg-layer{position:absolute;inset:0;background-repeat:no-repeat; background-position: top center; background-size: cover;}
.custom-text-container{position:absolute;top:0;left:0;right:0;bottom:0;min-height:100vh;z-index:0;opacity:0;transition:opacity 0.5s;pointer-events:none;overflow:hidden} .custom-text-layer{position:absolute;transform:translate(-50%,-50%);white-space:pre-wrap;text-align:center;font-family:'Cormorant Garamond',serif;text-shadow:2px 2px 10px rgba(0,0,0,0.8);line-height:1.1;pointer-events:none;}

select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c9a96e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");background-repeat:no-repeat;background-position:right 10px center;background-size:14px;padding-right:32px!important}select option{background-color:var(--bg);color:var(--text)}

/* --- APP HEADER & NAV (SOLID, NO FROSTED GLASS) --- */
.app-header {position:fixed; top:0; left:0; width:100%; height:60px; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:0 1.5rem; background:var(--bg); border-bottom:1px solid var(--border); transition:all 0.3s;}

.nav-brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--gold);letter-spacing:0.1em;font-style:italic;} .nav-brand span{font-style:normal;font-weight:500;color:var(--text);}
.lang-toggle{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
.lang-btn{padding:0.4rem 0.75rem;font-size:11px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:'Outfit';transition:all 0.2s;font-weight:500;} .lang-btn.active{background:var(--gold);color:#ffffff;font-weight:600;} .lang-btn:active {transform: scale(0.95);}

/* DESKTOP NAV */
.bottom-nav {position:fixed; top:60px; left:0; width:100%; display:flex; padding:0 2rem; background:var(--bg); border-bottom:1px solid var(--border); z-index:90; transition:all 0.3s;}

.nav-tab{padding:1rem 1.5rem;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;transition:all 0.2s;font-family:'Outfit'}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)} .nav-tab:hover:not(.active){color:var(--text)} .nav-tab:active {transform: scale(0.95);}

body.theme-vintage .nav-tab { color: var(--text3); font-weight:500; }
body.theme-vintage .nav-tab.active { color: var(--text); border-bottom-color: var(--text); }
body.theme-vintage .nav-brand span { color: var(--text); font-weight:600; }

/* MAIN CONTAINER */
#app-main { padding-top: 115px; padding-bottom: 2rem; min-height: 100vh; position:relative; z-index:10; }

#tree-view, #admin-view, #design-view, #auth-view { display: none; }
#tree-view.active-view { display: block; }
#admin-view.active-view, #design-view.active-view, #auth-view.active-view { display: grid; grid-template-columns: 280px 1fr; gap: 1.5rem; padding: 1.5rem 2rem; box-sizing: border-box; }

.tool-input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:0.6rem 1rem;border-radius:8px;font-family:'Outfit';font-size:13px;outline:none;width:100%;transition:all 0.2s; box-sizing:border-box;} .tool-input:focus{border-color:var(--gold)}
.tool-btn{background:var(--gold-soft);border:1px solid rgba(201,169,110,0.3);color:var(--gold);padding:0.6rem 1.4rem;border-radius:8px;font-family:'Outfit';font-size:13px;cursor:pointer;transition:all 0.2s;font-weight:500; white-space:nowrap; box-sizing:border-box;} .tool-btn:hover{background:var(--gold);color:#fff} .tool-btn:active {transform: scale(0.95);}

#login-overlay,#waiting-overlay{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column}.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:2.5rem 2rem;width:90%; max-width:340px; text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.2); transition:transform 0.3s;}.login-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold);font-style:italic;margin-bottom:0.25rem} .login-logo span{font-style:normal;color:var(--text)}.login-sub{font-size:12px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2rem}.auth-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:0.8rem 1rem;color:var(--text);font-size:14px;font-family:'Outfit';outline:none;margin-bottom:1rem;transition:border 0.2s} .auth-input:focus{border-color:var(--gold)}.auth-btn{width:100%;padding:0.8rem;border-radius:10px;background:var(--gold);border:none;color:#000;font-size:14px;font-weight:500;cursor:pointer;font-family:'Outfit';transition:all 0.2s;margin-bottom:0.5rem} .auth-btn:hover:not(:disabled){background:var(--gold2)} .auth-btn:active:not(:disabled){transform: scale(0.95);} .auth-btn:disabled{opacity:0.6;cursor:not-allowed}.auth-btn-sec{width:100%;padding:0.8rem;border-radius:10px;background:transparent;border:1px solid var(--border2);color:var(--text3);font-size:13px;cursor:pointer;font-family:'Outfit';transition:all 0.2s} .auth-btn-sec:hover{border-color:var(--gold);color:var(--gold)} .auth-btn-sec:active {transform: scale(0.95);}.auth-error{color:#f09595;font-size:12px;margin-bottom:1rem;min-height:15px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s} .modal-overlay.show{opacity:1;pointer-events:auto}.modal-content{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2rem;width:95%;max-width:400px;max-height:85vh;overflow-y:auto;position:relative;transform:translateY(20px);transition:transform 0.3s;box-shadow:0 15px 40px rgba(0,0,0,0.4);text-align:center} .modal-overlay.show .modal-content{transform:translateY(0)}.modal-close{position:absolute;top:15px;right:15px;background:transparent;border:none;color:var(--text3);font-size:24px;cursor:pointer;transition:color 0.2s} .modal-close:hover{color:var(--gold)}.modal-av{width:100px;height:100px;border-radius:50%;margin:0 auto 1rem;border:2px solid var(--gold);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden} .modal-av img{width:100%;height:100%;object-fit:cover}.modal-name{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--gold);margin-bottom:5px;line-height:1.1} .modal-dates{font-size:12px;color:var(--text3);margin-bottom:1.5rem;letter-spacing:0.05em}.modal-details{text-align:left;background:var(--surface);padding:1rem;border-radius:12px;border:1px solid var(--border2)} .modal-row{margin-bottom:0.75rem;font-size:14px} .modal-row:last-child{margin-bottom:0} .modal-row span{display:block;font-size:10px;text-transform:uppercase;color:var(--text3);letter-spacing:0.08em;margin-bottom:2px} .modal-row div{color:var(--text)} .modal-private{font-style:italic;color:var(--text2);font-size:13px;text-align:center;padding:1rem 0}.modal-gallery{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-top:10px;scroll-behavior:smooth} .modal-gallery::-webkit-scrollbar{height:6px} .modal-gallery::-webkit-scrollbar-track{background:var(--surface2);border-radius:3px} .modal-gallery::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px} .modal-gallery img{height:100px;border-radius:8px;border:1px solid var(--border);object-fit:cover;transition:border-color 0.2s} .modal-gallery img:hover{border-color:var(--gold)}

#tree-view{padding:1.5rem 1rem;min-height:560px}.tree-header{text-align:center;margin-bottom:1.5rem} .tree-header h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;letter-spacing:0.05em;line-height:1.2} .tree-header h1 em{color:var(--gold);font-style:italic} .tree-header p{font-size:12px;color:var(--text3);letter-spacing:0.1em;text-transform:uppercase;margin-top:0.5rem}.tree-toolbar{display:flex;justify-content:center;gap:10px;margin-bottom:2rem;flex-wrap:wrap}.tree-container{display:flex;overflow-x:auto;padding-bottom:4rem;width:100%;-webkit-overflow-scrolling:touch;transition:opacity 0.3s} .tree-container::before,.tree-container::after{content:'';margin:auto}#tree-root{position:relative;display:flex;flex-direction:column;align-items:center;padding:1rem 2rem;min-width:max-content;background:transparent;border-radius:12px;z-index:2}

/* SOLID CARDS (NO FROSTED GLASS) */
.person-card{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;border-radius:16px;transition:all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);border:1px solid var(--border); background:var(--surface); padding:10px; box-shadow:0 4px 15px rgba(0,0,0,0.1);} 
.person-card:hover:not(.view-only){background:var(--surface2);border-color:var(--gold);transform:translateY(-4px); box-shadow:0 8px 25px rgba(0,0,0,0.2);} 
.person-card:active:not(.view-only){transform:scale(0.96);}
.person-card.spouse-card{opacity:0.85}.avatar{border-radius:50%;border:2px solid var(--border2);flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:400;color:var(--text2);overflow:hidden;transition:border-color 0.2s} .person-card:hover:not(.view-only) .avatar{border-color:var(--gold)} .avatar img{width:100%;height:100%;object-fit:cover}

.person-name span,.spouse-label span,.date-label{position:relative;z-index:5;text-shadow:-3px -3px 0 var(--surface),3px -3px 0 var(--surface),-3px 3px 0 var(--surface),3px 3px 0 var(--surface),-3px 0 0 var(--surface),3px 0 0 var(--surface),0 -3px 0 var(--surface),0 3px 0 var(--surface),0 0 10px var(--surface),0 0 15px var(--surface)}.person-name{color:var(--text2);text-align:center} .person-name.primary{color:var(--text);font-weight:500}.spouse-label{font-size:9px;color:var(--text3);letter-spacing:0.06em;text-transform:uppercase}.date-label{font-size:10px;color:var(--text3);margin-top:2px;font-family:'Outfit'}.expand-btn{width:18px;height:18px;border-radius:50%;background:var(--gold);color:#000;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;cursor:pointer;position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);z-index:10;box-shadow:0 0 6px var(--gold);border:2px solid var(--bg);transition:all 0.2s} .expand-btn:hover{transform:translateX(-50%) scale(1.15)} .expand-btn:active{transform:translateX(-50%) scale(0.9);}

.tree-row{display:flex;justify-content:center;position:relative;padding-top:30px} .tree-col{display:flex;flex-direction:column;align-items:center;position:relative;padding:20px 24px 0} 

/* SOLID GOLD LINES WITH BRIGHT GLOWING PULSE */
@keyframes flowRight { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
@keyframes flowLeft { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes flowDown { 0% { background-position: 0 -200%; } 100% { background-position: 0 200%; } }

.tree-col::before{content:'';position:absolute;top:0;height:3px;background:linear-gradient(90deg, var(--gold) 0%, var(--gold) 45%, #fff 50%, var(--gold) 55%, var(--gold) 100%);background-size:300% 100%;z-index:0; box-shadow: 0 0 8px var(--gold); border-radius:2px;} 
.tree-col:first-child::before{left:calc(50% - var(--shift-x,0px));right:0; animation: flowRight 2.5s linear infinite;} 
.tree-col:last-child::before{left:0;right:calc(50% + var(--shift-x,0px)); animation: flowLeft 2.5s linear infinite;} 
.tree-col:not(:first-child):not(:last-child)::before{left:0;right:0;width:100%; animation: flowRight 2.5s linear infinite;} 
.tree-col:only-child::before{display:none} 
.tree-col::after{content:'';position:absolute;top:0;left:calc(50% - var(--shift-x,0px));width:3px;height:20px;background:linear-gradient(180deg, var(--gold) 0%, var(--gold) 45%, #fff 50%, var(--gold) 55%, var(--gold) 100%);background-size:100% 300%;transform:translateX(-50%);z-index:0; box-shadow: 0 0 8px var(--gold); animation: flowDown 2.5s linear infinite; border-radius:2px;} 
#tree-root>.tree-row{padding-top:0} #tree-root>.tree-row>.tree-col{padding-top:0} #tree-root>.tree-row>.tree-col::before, #tree-root>.tree-row>.tree-col::after{display:none} @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}} .person-card{animation:fadeIn 0.25s ease both}

/* ADMIN PANELS (SOLID BACKGROUNDS) */
.admin-sidebar{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem;overflow-y:auto;max-height:80vh;display:flex;flex-direction:column}
.sidebar-title{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:1rem}
.member-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:all 0.15s;border:1px solid transparent} .member-item:hover,.member-item.active{background:var(--surface2);border-color:var(--border)} .member-item:active{transform:scale(0.97);}
.mini-av{width:34px;height:34px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);flex-shrink:0;overflow:hidden} .mini-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.item-name{font-size:13px;color:var(--text)} .item-role{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em}
.sidebar-btn{width:100%;margin-top:0.75rem;padding:0.55rem;border-radius:10px;font-size:12px;cursor:pointer;transition:all 0.2s;font-family:'Outfit';letter-spacing:0.04em} .btn-add{background:var(--gold-soft);border:1px solid rgba(201,169,110,0.25);color:var(--gold)} .btn-add:hover{background:rgba(201,169,110,0.18)} .btn-add:active{transform:scale(0.95);}
.admin-form-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem; overflow-x:hidden;} .admin-form-wrap h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;margin-bottom:1.25rem;color:var(--text)}

.bg-editor{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem;display:flex;flex-direction:column;gap:0.75rem} .bg-editor h4{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);margin-bottom:5px;font-weight:400}
.drop-zone{border:2px dashed var(--border2);border-radius:8px;padding:1.5rem 1rem;text-align:center;color:var(--text3);font-size:12px;transition:all 0.2s;cursor:pointer;background:var(--bg)} .drop-zone.dragover{border-color:var(--gold);background:var(--surface3);color:var(--gold)}
.slider-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px; width:100%;} .slider-row label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;min-width:45px; flex-shrink:0;} .slider-row input[type="range"]{flex:1;-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer;min-width:0; width:100%;} .slider-row input[type="range"]::-webkit-slider-runnable-track{background:var(--border2);height:4px;border-radius:2px} .slider-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;margin-top:-4px;background-color:var(--gold);height:12px;width:12px;border-radius:50%}

.user-card{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);padding:1rem;border-radius:12px;margin-bottom:1rem;flex-wrap:wrap;gap:10px;} .user-info strong{font-size:16px;color:var(--text);display:block;margin-bottom:4px} .user-info span{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;padding:2px 6px;border-radius:4px} .status-pending{background:rgba(240,150,100,0.15);color:#f0a864;border:1px solid rgba(240,150,100,0.3)} .status-approved{background:rgba(100,200,120,0.15);color:#64c878;border:1px solid rgba(100,200,120,0.3)} .status-admin{background:var(--gold-soft);color:var(--gold);border:1px solid rgba(201,169,110,0.3)} 
.auth-actions{display:flex;gap:0.5rem;flex-wrap:wrap; justify-content: flex-end;}

  function handleDropZoneOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
  function handleDropZoneLeave(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); }
  function handleDropZoneDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); let f = e.dataTransfer.files[0]; if(f) processBgFile(f); }
  function handleBgFile(inp) { let f = inp.files[0]; if(f) processBgFile(f); }
  
  function processBgFile(file) {
    let btn = getEl('btn-save-bg'); if(btn) { btn.disabled = true; btn.textContent = 'Processing...'; }
    let r = new FileReader();
    r.onload = e => {
      let img = new Image();
      img.onload = () => {
        let c = document.createElement('canvas'), M = 1600, w = img.width, h = img.height;
        if(w > h) { if(w > M) { h *= M/w; w = M; } } else { if(h > M) { w *= M/h; h = M; } }
        c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h);
        if(!state.bgLayers) state.bgLayers = [];
        state.bgLayers.push({ id: 'bg'+Date.now(), url: c.toDataURL('image/jpeg', 0.8), zoom: 100, x: 50, y: 50 });
        applyBgSettings(); refreshStudioPreview(); renderDesignStudio();
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  }
  function updateLayer(id, p, v) { let l = state.bgLayers.find(x => x.id === id); if(l) { l[p] = v; applyBgSettings(); refreshStudioPreview(); } }
  function removeLayer(id) { state.bgLayers = state.bgLayers.filter(x => x.id !== id); applyBgSettings(); renderDesignStudio(); }
  function saveBgSettings() { if(isAdmin()) { saveToFirebase(); showToast('saved!'); } }

  /* --- MULTI-GALLERY UPLOADER --- */
  function handleGalleryFiles(inp) {
    let files = inp.files; if(!files || !files.length) return;
    let btn = document.querySelector('.btn-save'); if(btn) { btn.disabled = true; btn.textContent = 'Processing...'; }
    let processed = 0;
    for(let i=0; i<files.length; i++) {
      let r = new FileReader();
      r.onload = e => {
        let img = new Image();
        img.onload = () => {
          let c = document.createElement('canvas'), M = 800, w = img.width, h = img.height;
          if(w>h) { if(w>M){h*=M/w; w=M;} } else { if(h>M){w*=M/h; h=M;} }
          c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h);
          state.prevGallery.push(c.toDataURL('image/jpeg', 0.7)); processed++;
          if(processed === files.length) { if(btn) { btn.disabled = false; btn.textContent = s('sv'); } renderGalleryPreviews(); }
        };
        img.src = e.target.result;
      };
      r.readAsDataURL(files[i]);
    }
  }

    let c = getEl('gallery-previews'); if(!c) return;
    c.innerHTML = state.prevGallery.map((src, i) => `<div style="position:relative; width:60px; height:60px; border-radius:8px; overflow:hidden; border:1px solid var(--border2); flex-shrink:0;"><img src="${src}" style="width:100%; height:100%; object-fit:cover;"><div onclick="App.removeGalleryImg(${i})" style="position:absolute; top:2px; right:2px; background:rgba(0,0,0,0.7); color:#fff; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:10px;">×</div></div>`).join('');

  /* --- DATA SYNC --- */
  function saveToFirebase(){
    if(!state.dbReady || state.isViewOnly) return;
    try {
      let payload = JSON.parse(JSON.stringify({members: state.members, familyName: state.familyName, bgLayers: state.bgLayers, textLayers: state.textLayers, v: 1}));
      dataRef.set(payload).then(() => showSync('✓ saved')).catch(() => showSync('⚠ sync failed', '#f09595'));
    } catch(e) { showSync('⚠ data error', '#f09595'); }
  }

  function startSync(){
    showSync('loading…', 'var(--text3)');
    dataRef.on('value', snap => {
      let d = snap.val(); state.dbReady = true;
      if(d){
        let rm = d.members || []; if(!Array.isArray(rm) && typeof rm === 'object') rm = Object.keys(rm).map(k => rm[k]);
        state.members = rm.filter(Boolean).map(m => { if(m.parentId === undefined || m.parentId === '') m.parentId = null; return m; });
        state.familyName = d.familyName || 'Shah'; 
        state.bgLayers = d.bgLayers || [];
        state.textLayers = d.textLayers || [];
      } else { state.members = []; state.bgLayers = []; state.textLayers = []; }
      
      let bn = getEl('brand-name'); if(bn) bn.textContent = state.familyName;
      applyBgSettings();
      applyTextSettings();

      let activeTabBtn = document.querySelector('.nav-tab.active') || getEl('tab-tree');
      let activeView = activeTabBtn.id.replace('tab-', '');
      if(activeView !== 'tree' && !isEditor()) { activeView = 'tree'; activeTabBtn = getEl('tab-tree'); }
      showView(activeView, activeTabBtn);
      
      showSync('✓ connected');
    });

    if(!state.isViewOnly){
      usersRef.on('value', snap => {
        state.users = snap.val() || {};
        if(state.currentUser && state.currentUser.username !== MASTER_USER){
           let key = Object.keys(state.users).find(k => state.users[k].username === state.currentUser.username);
           let dbU = key ? state.users[key] : null;
           if(!dbU) { doLogout(); return; }
           let u = false; 
           if(state.currentUser.status !== dbU.status) { state.currentUser.status = dbU.status; u = true; }
           if(state.currentUser.role !== dbU.role) { state.currentUser.role = dbU.role; u = true; }
           
           let assignedStr = JSON.stringify(dbU.assignedProfiles || []);
           let currentStr = JSON.stringify(state.currentUser.assignedProfiles || []);
           if(assignedStr !== currentStr) { state.currentUser.assignedProfiles = dbU.assignedProfiles || []; u = true; }

           if(u) {
              localStorage.setItem('famUser', JSON.stringify(state.currentUser));
              if(state.currentUser.status === 'approved') unlockApp(); 
              else {
                 getEl('app-header').style.display='none'; getEl('main-nav').style.display='none'; getEl('app-main').style.display='none';
                 getEl('waiting-overlay').style.display='flex';
              }
           }
        }
        let authV = getEl('auth-view'); if(authV && authV.classList.contains('active-view') && isAdmin()) renderAuthPanel();
        let editV = getEl('admin-view'); if(editV && editV.classList.contains('active-view') && isEditor()) renderAdmin();
      });
    }
  }

  /* --- AUTH & LOGIN --- */
  function checkLocalAuth() {
    const t = new URLSearchParams(window.location.search).get('share');
    if(t) {
       getEl('auth-title').textContent = "Checking secure link...";
       ['auth-user','auth-pass','btn-login-submit','btn-login-toggle'].forEach(id => getEl(id).style.display='none');
       linksRef.child(t).once('value').then(snap => {
           let d = snap.val();
           if(d && d.expiresAt > Date.now()) { state.isViewOnly = true; unlockApp(); }
           else {
               getEl('auth-error').textContent = "Link expired/invalid.";
               let b = getEl('btn-login-toggle'); b.style.display='block'; b.textContent="Return to Login";
               b.onclick = () => window.location.href = window.location.pathname;
           }
       }).catch(e => { getEl('auth-error').textContent = "Connection error."; });
       return;
    }
    let s = localStorage.getItem('famUser');
    if(s){ 
      state.currentUser = JSON.parse(s);
      if(state.currentUser.status === 'approved') unlockApp();
      else { getEl('login-overlay').style.display='none'; getEl('waiting-overlay').style.display='flex'; startSync(); } 
    }
  }

  function toggleAuthMode() {
    let err = getEl('auth-error'), t = getEl('auth-title'), b = getEl('btn-login-submit'), tgl = getEl('btn-login-toggle'); err.textContent = '';
    if(state.authMode === 'login') {
      state.authMode = 'register'; t.textContent = 'create account'; b.textContent = 'Register'; tgl.textContent = 'I already have an account';
    } else {
      state.authMode = 'login'; t.textContent = 'secure access'; b.textContent = 'Log In'; tgl.textContent = 'Create an Account instead';
    }
  }

  function doAuth() {
    let un = getEl('auth-user').value.trim(), pw = getEl('auth-pass').value.trim(), err = getEl('auth-error'); err.textContent = '';
    if(!un || !pw) { err.textContent = 'Enter both fields.'; return; }
    
    if(un.toLowerCase() === MASTER_USER.toLowerCase() && pw === MASTER_PASS) {
       state.currentUser = { username: MASTER_USER, role: 'admin', status: 'approved', assignedProfiles: [] };
       localStorage.setItem('famUser', JSON.stringify(state.currentUser)); unlockApp(); return;
    }
    
    let encodedPw = btoa(pw);

    let btn = getEl('btn-login-submit'); let o = btn.textContent; btn.textContent = 'Checking...'; btn.disabled = true;
    usersRef.once('value').then(snap => {
       btn.textContent = o; btn.disabled = false;
       let users = snap.val() || {};
       let key = Object.keys(users).find(k => users[k] && users[k].username && users[k].username.toLowerCase() === un.toLowerCase());
       let dbU = key ? users[key] : null;

       if(state.authMode === 'login') {
          if(!dbU) { err.textContent = 'Username not found.'; return; }
          if(dbU.password !== encodedPw && dbU.password !== pw) { err.textContent = 'Incorrect password.'; return; }
          
          state.currentUser = { username: dbU.username, role: dbU.role, status: dbU.status, assignedProfiles: dbU.assignedProfiles || [] };
          localStorage.setItem('famUser', JSON.stringify(state.currentUser));
          
          if(dbU.status === 'approved') unlockApp();
          else { getEl('login-overlay').style.display='none'; getEl('waiting-overlay').style.display='flex'; startSync(); }
       } else {
          if(dbU) { err.textContent = 'Username taken.'; return; }
          if(un.toLowerCase() === MASTER_USER.toLowerCase()) { err.textContent = 'Reserved.'; return; }
          usersRef.push({username: un, password: encodedPw, role: 'member', status: 'pending', assignedProfiles: []}).then(() => {
             state.currentUser = { username: un, role: 'member', status: 'pending', assignedProfiles: [] };
             localStorage.setItem('famUser', JSON.stringify(state.currentUser));
             getEl('login-overlay').style.display='none'; getEl('waiting-overlay').style.display='flex'; startSync();
          }).catch(e => err.textContent = "Error: " + e.message);
       }
    }).catch(e => {
       btn.textContent = o; btn.disabled = false;
       console.error(e);
       err.textContent = "Database connection error.";
    });
  }

     getEl('pm-dates').textContent = ds;

         let mDate = m.marriageDate;

         if(dh === '') dh = '<div class="modal-private">No additional records found.</div>';
         
         let gallery = m.gallery;

  function applySearch() {
      let fMatch = null, cards = document.querySelectorAll('.person-card');
      cards.forEach(c => {

          let ms = state.searchQuery === '' || n.includes(state.searchQuery);

             if(state.searchQuery !== '') { c.style.boxShadow = '0 0 30px rgba(201,169,110,0.6)'; c.style.borderColor = 'var(--gold)'; if(!fMatch) fMatch = c; }

             c.style.opacity = '0.15'; c.style.transform = 'scale(0.95)'; c.style.boxShadow = 'none'; c.style.borderColor = 'transparent'; 
          }

  function toggleAccordionMode() {

  /* --- TREE RENDER --- */
  function toggleExpand(id, e) { 
      if(e) e.stopPropagation(); 
      
      if(state.expanded[id]) {
          delete state.expanded[id]; 
      } else {
          if(state.accordionMode) {
              let clickedMember = state.members.find(m => m && m.id === id);
              if(clickedMember) {
                  state.members.forEach(m => {
                      if(m && m.parentId === clickedMember.parentId && m.id !== id) {
                          delete state.expanded[m.id];
                      }
                  });
              }
          }
          state.expanded[id] = true; 
      }
      
      state.scrollTarget = id;
      renderTree(); 
  }
  
  function makeAvatar(m, sz) { 
      let av = document.createElement('div'); av.className = 'avatar'; av.style.cssText = `width:${sz}px;height:${sz}px;font-size:${Math.round(sz*0.27)}px`; 
      if(m.photo) { let img = document.createElement('img'); img.src = m.photo; img.onerror = () => av.textContent = initials(m.name); av.appendChild(img); } 
      else { av.textContent = initials(m.name); } 
      return av; 
  }
  
  function buildCard(m, sz, fs, pad, cardW, hasKids, isExp, isSpouse) {
    let card = document.createElement('div'); 
    card.className = 'person-card' + (isSpouse ? ' spouse-card' : '') + (state.isViewOnly ? ' view-only' : '') + (m.id === state.selected ? ' selected' : '');
    card.setAttribute('data-id', m.id); card.setAttribute('data-name', dname(m) + " " + (m.nameHi || "")); card.setAttribute('data-dead', m.deathYear ? 'true' : 'false');
    card.style.cssText = `padding:${pad}px; width:${cardW}px; min-width:${cardW}px; flex-shrink:0; display:flex; flex-direction:column; align-items:center;`;
    
    card.appendChild(makeAvatar(m, sz));
    
    let nm = document.createElement('div'); nm.className = 'person-name' + (isSpouse ? '' : ' primary'); nm.style.cssText = `font-size:${fs}px; margin-top:10px; width:100%; display:flex; justify-content:center; overflow:visible;`;
    let span = document.createElement('span'); span.style.cssText = 'display:block; margin: 0 -30px; text-align:center; line-height:1.1;'; 
    span.innerHTML = dname(m).replace(/ /g, '<br>'); nm.appendChild(span); card.appendChild(nm);
    
    if(isSpouse) { 
        let sl = document.createElement('div'); sl.className = 'spouse-label'; sl.style.cssText = 'width:100%; display:flex; justify-content:center; overflow:visible; margin-top:4px;'; 
        let slSpan = document.createElement('span'); slSpan.style.cssText = 'display:block; margin: 0 -30px; text-align:center;'; slSpan.textContent = s('sp'); sl.appendChild(slSpan); card.appendChild(sl); 
    }
    
    if(m.birthYear || m.deathYear) { 
        let dt = document.createElement('div'); dt.className = 'date-label'; 
        let by = m.birthYear ? m.birthYear.trim() : '', dy = m.deathYear ? m.deathYear.trim() : ''; 
        dt.textContent = (by && dy) ? `${by} - ${dy}` : (by && !dy) ? `${by} - Present` : (!by && dy) ? `Died: ${dy}` : ''; 
        card.appendChild(dt); 
    }
    
    if(hasKids && !isSpouse) { 
        let btn = document.createElement('div'); btn.className = 'expand-btn'; btn.innerHTML = isExp ? '-' : '+'; 
        btn.onclick = e => toggleExpand(m.id, e); card.appendChild(btn); 
    }
    
    card.onclick = () => { App.openProfile(m.id); };
    return card;
  }

  function renderLevel(parent, parentId, gen) {
    let prim = getPrimaries(parentId); if(!prim.length) return;
    let {sz, fs, pad, cardW, connW} = getSizes(); let topStart = Math.round(sz/2 + pad);
    let row = document.createElement('div'); row.className = 'tree-row'; 
    
    prim.forEach(m => {
      let col = document.createElement('div'); col.className = 'tree-col'; 
      let sp = getSpouse(m), kids = getChildren(m), exp = state.isViewOnly ? true : !!state.expanded[m.id];
      let pw = document.createElement('div'); pw.style.cssText = 'display: flex; align-items: flex-start; position: relative; z-index: 2;';
      
      pw.appendChild(buildCard(m, sz, fs, pad, cardW, kids.length > 0, exp, false));
      
      if(sp) {
        let conn = document.createElement('div'); conn.style.cssText = `display:flex; align-items:center; padding-top:${topStart - 1}px; width:${connW}px; justify-content: center; flex-shrink: 0;`;
        conn.innerHTML = `<div style="width:100%; height:3px; background: linear-gradient(90deg, var(--gold) 0%, var(--gold) 45%, #fff 50%, var(--gold) 55%, var(--gold) 100%); background-size: 300% 100%; animation: flowRight 2.5s linear infinite; box-shadow: 0 0 8px var(--gold); border-radius:2px;"></div>`;
        pw.appendChild(conn); pw.appendChild(buildCard(sp, sz, fs, pad, cardW, false, false, true)); 
        col.style.setProperty('--shift-x', ((cardW + connW) / 2) + 'px');
      } else { col.style.setProperty('--shift-x', '0px'); }
      col.appendChild(pw);
      
      if(kids.length && exp) {
          let dl = document.createElement('div'); dl.style.cssText = `position: absolute; bottom: -30px; width: 3px; background: linear-gradient(180deg, var(--gold) 0%, var(--gold) 45%, #fff 50%, var(--gold) 55%, var(--gold) 100%); background-size: 100% 300%; animation: flowDown 2.5s linear infinite; z-index: -1; top: ${sp ? topStart + 'px' : '100%'}; left: 50%; transform: translateX(-50%); box-shadow: 0 0 8px var(--gold); border-radius:2px;`;
          let cr = document.createElement('div'); cr.style.position = 'relative'; 
          pw.appendChild(dl); renderLevel(cr, m.id, gen + 1); col.appendChild(cr);
      }
      row.appendChild(col);
    }); 
    parent.appendChild(row);
  }

        <div class="fg full"><label>${s('spN')} (EN)</label><input type="text" id="f-sp" placeholder="${s('bl')}" value="${spN}"></div>
        <div class="fg full"><label>पति/पत्नी (हिंदी)</label><input type="text" id="f-sp-hi" placeholder="${s('bl')}" value="${spNHi}"></div>

      <div class="form-actions">${m ? `<button class="btn-del" onclick="App.delMember('${m.id}')">${s('del')}</button>` : ''}<button class="btn-cancel" onclick="App.cancelEdit()">${s('can')}</button><button class="btn-save" onclick="App.saveMember()">${s('sv')}</button></div>
    `;
    renderGalleryPreviews(); 
  }

  function renderAuthPanel() {
    if(!isAdmin()) return; 
    let v = getEl('auth-view'); let uHtml = '', h = false;
    
    Object.keys(state.users).forEach(k => {
       let u = state.users[k]; h = true;
       let stat = u.status === 'pending' ? '<span class="status-pending">Pending</span>' : (u.role === 'admin' ? '<span class="status-admin">Admin</span>' : '<span class="status-approved">Approved</span>');
       let a = ''; 
       if(u.status === 'pending') {
           a = `<button class="auth-act-btn btn-approve" onclick="App.modifyUser('${k}', 'approve')">Approve</button>`;
       } else { 
           a += `<button class="auth-act-btn btn-promote" onclick="App.openAssignModal('${k}')">Assign Profiles</button>`;
           if(u.role !== 'admin') a += `<button class="auth-act-btn btn-promote" onclick="App.modifyUser('${k}', 'admin')">Make Admin</button>`; 
           else a += `<button class="auth-act-btn btn-revoke" onclick="App.modifyUser('${k}', 'demote')">Make Member</button>`; 
           a += `<button class="auth-act-btn btn-revoke" onclick="App.modifyUser('${k}', 'revoke')">Revoke</button>`; 
       }
       uHtml += `<div class="user-card"><div class="user-info"><strong>${u.username}</strong>${stat}</div><div class="auth-actions">${a}</div></div>`;
    });
    
    if(!h) uHtml = '<div class="empty-state"><span>No registered users yet.</span></div>';
    
    let lHtml = `<div class="share-generator"><h3>View-Only Link</h3><div class="share-controls"><select id="share-expiry" class="share-select"><option value="1">1 Hour</option><option value="24">24 Hours</option><option value="168">7 Days</option></select><button class="share-btn" onclick="App.generateShareLink()">Copy Link</button></div></div>`;
    
    let searchHtml = `<input type="text" class="tool-input" placeholder="Search users..." oninput="App.filterAuth(this.value)" style="margin-bottom:15px; width:100%; box-sizing:border-box;">`;
    v.innerHTML = `<div class="admin-sidebar"><div class="sidebar-title">Access</div><p style="font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:12px;">Approve members and assign them profiles.</p>${searchHtml}</div><div class="admin-form-wrap"><h2>Authentication</h2><div style="margin-top:1.5rem;" id="auth-user-list">${uHtml}</div>${lHtml}</div>`;
  }

  function openAssignModal(userKey) {
      if(!isAdmin()) return;
      let u = state.users[userKey];
      if(!u) return;
      state.assigningUserKey = userKey;
      getEl('assign-uname').textContent = u.username;
      
      let assigned = u.assignedProfiles || [];
      let allMems = Array.isArray(state.members) ? state.members : [];
      
      let listHtml = allMems.filter(m => !m.isSpouse).map(m => {
          let isChecked = assigned.includes(m.id) ? 'checked' : '';
          return `<label style="display:flex; align-items:center; gap:12px; font-size:15px; cursor:pointer; color:var(--text); padding: 8px 0; border-bottom:1px solid var(--border); transition:all 0.2s;"><input type="checkbox" class="assign-cb" value="${m.id}" ${isChecked} style="width:20px;height:20px;accent-color:var(--gold);"> <div class="mini-av">${m.photo ? `<img src="${m.photo}">` : initials(m.name)}</div> <span style="font-weight:500;">${dname(m)}</span></label>`;
      }).join('');
      
      getEl('assign-list').innerHTML = listHtml || '<div style="font-size:13px; color:var(--text3); text-align:center; padding:20px;">No primary members in tree yet.</div>';
      getEl('assign-modal').classList.add('show');
  }

  function closeAssignModal() {
      getEl('assign-modal').classList.remove('show');
      state.assigningUserKey = null;
  }

  function saveAssignments() {
      if(!isAdmin() || !state.assigningUserKey) return;
      let checked = Array.from(document.querySelectorAll('.assign-cb:checked')).map(cb => cb.value);
      usersRef.child(state.assigningUserKey).update({ assignedProfiles: checked });
      showToast('Assignments Saved!');
      closeAssignModal();
  }

  function modifyUser(k, a) { 
      if(!isAdmin()) return; 
      let r = usersRef.child(k); 
      if(a === 'approve') r.update({status: 'approved'}); 
      else if(a === 'admin') r.update({role: 'admin'}); 
      else if(a === 'demote') r.update({role: 'member'}); 
      else if(a === 'revoke') r.remove(); 
      showToast('Updated'); 
  }
  
  function generateShareLink() { 
      if(!isAdmin()) return; 
      let h = parseInt(getEl('share-expiry').value) || 1, tk = 'share_' + Math.random().toString(36).substr(2,9), e = Date.now() + (h*60*60*1000); 
      linksRef.child(tk).set({expiresAt: e, createdBy: state.currentUser.username}).then(() => { 
          let u = window.location.origin + window.location.pathname + '?share=' + tk; 
          navigator.clipboard.writeText(u).then(() => showToast("Link Copied!")).catch(() => prompt("Copy this:", u)); 
      }); 
  }
  
  function updateFamilyName() { 
      if(!isAdmin()) return; 
      let v = (getEl('fn-inp') || {}).value; if(!v || !v.trim()) return; 
      state.familyName = v.trim(); saveToFirebase(); showToast(s('sved')); renderTree(); 
  }
  
  function startNew() { 
      state.editingId = '__new__'; state.prevPhoto = ''; state.prevPhotoSpouse = ''; state.prevGallery = []; 
      renderAdmin(); 
      scrollToForm();
  }
  
  function cancelEdit() { state.editingId = null; state.prevPhoto = ''; state.prevPhotoSpouse = ''; state.prevGallery = []; renderAdmin(); }
  
  function applyUrl() { let u = (getEl('p-url')||{}).value||''; u=u.trim(); if(u==='' && state.prevPhoto && state.prevPhoto.startsWith('data:image')) return; state.prevPhoto=u; let pp=getEl('pp'); if(pp) pp.innerHTML = u ? `<img src="${u}">` : '?'; }
  function handleFile(inp) { 
      let f = inp.files[0]; if(!f) return; 
      let btn = document.querySelector('.btn-save'); if(btn){ btn.disabled=true; btn.textContent='Processing...'; } 
      let r = new FileReader(); r.onload = e => { 
          let img = new Image(); img.onload = () => { 
              let c = document.createElement('canvas'), M = 180, w = img.width, h = img.height; 
              if(w > h) { if(w > M) { h *= M/w; w = M; } } else { if(h > M) { w *= M/h; h = M; } } 
              c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h); 
              state.prevPhoto = c.toDataURL('image/jpeg', 0.85); 
              let pp = getEl('pp'); if(pp) pp.innerHTML = `<img src="${state.prevPhoto}">`; 
              let pu = getEl('p-url'); if(pu) pu.value = ''; 
              if(btn) { btn.disabled=false; btn.textContent=s('sv'); } 
          }; 
          img.src = e.target.result; 
      }; 
      r.readAsDataURL(f); 
  }
  
  function applyUrlSp() { let u = (getEl('p-url-sp')||{}).value||''; u=u.trim(); if(u==='' && state.prevPhotoSpouse && state.prevPhotoSpouse.startsWith('data:image')) return; state.prevPhotoSpouse=u; let pp=getEl('pp-sp'); if(pp) pp.innerHTML = u ? `<img src="${u}">` : '?'; }
  function handleFileSp(inp) { 
      let f = inp.files[0]; if(!f) return; 
      let btn = document.querySelector('.btn-save'); if(btn) { btn.disabled=true; btn.textContent='Processing...'; } 
      let r = new FileReader(); r.onload = e => { 
          let img = new Image(); img.onload = () => { 
              let c = document.createElement('canvas'), M = 180, w = img.width, h = img.height; 
              if(w > h) { if(w > M) { h *= M/w; w = M; } } else { if(h > M) { w *= M/h; h = M; } } 
              c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h); 
              state.prevPhotoSpouse = c.toDataURL('image/jpeg', 0.85); 
              let pp = getEl('pp-sp'); if(pp) pp.innerHTML = `<img src="${state.prevPhotoSpouse}">`; 
              let pu = getEl('p-url-sp'); if(pu) pu.value = ''; 
              if(btn) { btn.disabled=false; btn.textContent=s('sv'); } 
          }; 
          img.src = e.target.result; 
      }; 
      r.readAsDataURL(f); 
  }

  async function saveMember() {
    if(!isEditor()) return; 
    const GEMINI_API_KEY = 'YOUR_API_KEY_HERE';
    if(!state.members) state.members = []; 
    if(!Array.isArray(state.members)) state.members = Object.keys(state.members).map(k => state.members[k]);
    
    let fn = (getEl('f-fn')||{}).value||'', ln = (getEl('f-ln')||{}).value||''; fn=fn.trim(); ln=ln.trim();
    let fnHi = (getEl('f-fn-hi')||{}).value||'', lnHi = (getEl('f-ln-hi')||{}).value||''; fnHi=fnHi.trim(); lnHi=lnHi.trim();
    if(!fn && !fnHi){ showToast('Enter name'); return; }
    let name = ln ? fn+' '+ln : fn, nameHi = fnHi ? (lnHi ? fnHi+' '+lnHi : fnHi) : '';
    
    let bYear = (getEl('f-by')||{}).value||'', dYear = (getEl('f-dy')||{}).value||'';
    let dob = (getEl('f-dob')||{}).value||'', mDate = (getEl('f-mdate')||{}).value||'', phone = (getEl('f-phone')||{}).value||'', address = (getEl('f-address')||{}).value||'';
    let parentId = (getEl('f-par')||{}).value||null, gen = parseInt((getEl('f-gen')||{}).value||'0')||0;
    
    let spN = ((getEl('f-sp')||{}).value||'').trim(), spNHi = ((getEl('f-sp-hi')||{}).value||'').trim();
    let spBy = ((getEl('f-sp-by')||{}).value||'').trim(), spDy = ((getEl('f-sp-dy')||{}).value||'').trim();
    let spDob = ((getEl('f-sp-dob')||{}).value||'').trim(), spPhone = ((getEl('f-sp-phone')||{}).value||'').trim();
    let spAddr = ((getEl('f-sp-address')||{}).value||'').trim();

    async function qTrans(t, l) { 
        if(!GEMINI_API_KEY || GEMINI_API_KEY === 'YOUR_API_KEY_HERE') return ''; 
        try { 
            let u = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + GEMINI_API_KEY;
            let res = await fetch(u, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({contents: [{parts: [{text: `Transliterate into ${l}. Return ONLY the translated name: ${t}`}]}]})});
            let d = await res.json(); 
            return d.candidates ? d.candidates[0].content.parts[0].text.trim() : ''; 
        } catch(e) { return ''; } 
    }
    
    let btn = document.querySelector('.btn-save'); let ob = btn ? btn.textContent : 'Save'; if(btn) btn.disabled = true;
    
    if(name && !nameHi) { if(btn) btn.textContent='Translating...'; nameHi = await qTrans(name, 'Hindi (Devanagari)'); } 
    else if(nameHi && !name) { if(btn) btn.textContent='Translating...'; name = await qTrans(nameHi, 'English (Roman)'); }
    
    if(spN && !spNHi) { if(btn) btn.textContent='Translating...'; spNHi = await qTrans(spN, 'Hindi (Devanagari)'); } 
    else if(spNHi && !spN) { if(btn) btn.textContent='Translating...'; spN = await qTrans(spNHi, 'English (Roman)'); }
    
    if(btn) { btn.textContent = ob; btn.disabled = false; } 
    if(!name) name = nameHi; if(!nameHi) nameHi = name;

    let pD = { name, nameHi, photo: state.prevPhoto, parentId, generation: gen, birthYear: bYear.trim(), deathYear: dYear.trim(), dob: dob.trim(), marriageDate: mDate.trim(), phone: phone.trim(), address: address.trim(), gallery: state.prevGallery };
    
    if(state.editingId === '__new__') {
      pD.id = 'm' + Date.now(); 
      pD.spouse = ''; 
      pD.isSpouse = false;
      state.members.push(pD);
      
      let createdSpouseId = null;
      if(spN || spNHi) { 
          let sid = pD.id + 's'; pD.spouse = sid; createdSpouseId = sid;
          state.members.push({ id: sid, name: spN, nameHi: spNHi, photo: state.prevPhotoSpouse, parentId: null, generation: gen, spouse: pD.id, isSpouse: true, birthYear: spBy, deathYear: spDy, dob: spDob, phone: spPhone, address: spAddr }); 
      }
      state.editingId = pD.id;

      if(!isAdmin() && state.currentUser) {
          let currentAssignments = state.currentUser.assignedProfiles || [];
          currentAssignments.push(pD.id);
          if(createdSpouseId) currentAssignments.push(createdSpouseId); 
          
          let myKey = Object.keys(state.users).find(k => state.users[k].username === state.currentUser.username);
          if (myKey) {
              usersRef.child(myKey).update({ assignedProfiles: currentAssignments });
              state.currentUser.assignedProfiles = currentAssignments;
              localStorage.setItem('famUser', JSON.stringify(state.currentUser));
          }
      }

    } else {
      let m = state.members.find(x => x && x.id === state.editingId);
      if(m) { 
        Object.assign(m, pD); 
        if(spN || spNHi) {
          if(m.spouse) { 
              let sp = state.members.find(x => x && x.id === m.spouse); 
              if(sp) { 
                  sp.name = spN; sp.nameHi = spNHi; sp.photo = state.prevPhotoSpouse; 
                  sp.birthYear = spBy; sp.deathYear = spDy; sp.dob = spDob; sp.phone = spPhone; sp.address = spAddr;
              } 
          } else { 
              let sid = m.id + 's'; m.spouse = sid; 
              state.members.push({ id: sid, name: spN, nameHi: spNHi, photo: state.prevPhotoSpouse, parentId: null, generation: gen, spouse: m.id, isSpouse: true, birthYear: spBy, deathYear: spDy, dob: spDob, phone: spPhone, address: spAddr }); 
          }
        } else if(m.spouse) { 
            state.members = state.members.filter(x => x && x.id !== m.spouse); m.spouse = ''; 
        }
      }
    }
    saveToFirebase(); showToast(s('sved')); renderAdmin(); renderTree();
  }

  function delMember(id) {
    if(!isEditor()) return; 
    let m = state.members.find(x => x && x.id === id);
    if(m && m.spouse) { state.members = state.members.filter(x => x && x.id !== m.spouse); delete state.expanded[m.spouse]; }
    state.members.filter(x => x && x.parentId === id).forEach(c => c.parentId = null); 
    state.members = state.members.filter(x => x && x.id !== id);
    delete state.expanded[id]; state.editingId = null; 
    saveToFirebase(); showToast(s('dlted')); renderAdmin(); renderTree();
  }

  function showView(v, btn) {
    if(v === 'admin' && !isEditor()) { showToast("Blocked."); return; }
    if((v === 'auth' || v === 'design') && !isAdmin()) { showToast("Blocked."); return; }
    
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active')); 
    if (btn) btn.classList.add('active');
    else {
        let fallbackBtn = getEl('tab-' + v);
        if(fallbackBtn) fallbackBtn.classList.add('active');
    }
    
    ['tree-view', 'admin-view', 'design-view', 'auth-view'].forEach(id => {
        let el = getEl(id);
        if(el) {
            el.classList.remove('active-view');
            el.style.display = 'none'; 
        }
    });
    
    let activeEl = getEl(v + '-view');
    if(activeEl) {
        activeEl.classList.add('active-view');
        activeEl.style.display = '';
    }
    
    let bg = getEl('custom-bg'), txtLayer = getEl('custom-text-container'), cv = document.querySelector('.bg-canvas');
    if(v === 'tree') { 
        if(state.bgLayers && state.bgLayers.length) if(bg) bg.style.opacity = '1';
        if(state.textLayers && state.textLayers.length) if(txtLayer) txtLayer.style.opacity = '1';
        if(cv) cv.style.opacity = (state.bgLayers && state.bgLayers.length) ? '0' : '1'; 
    } else { 
        if(bg) bg.style.opacity = '0'; 
        if(txtLayer) txtLayer.style.opacity = '0'; 
        if(cv) cv.style.opacity = '1'; 
    }
    
    if(v === 'tree') renderTree(); 
    else if(v === 'admin') { state.editingId = null; renderAdmin(); } 
    else if(v === 'design') renderDesignStudio(); 
    else if(v === 'auth') renderAuthPanel();
    
    window.scrollTo(0, 0);
  }

  (function shootStar(){
  const s=document.createElement('div'),t=document.createElement('div');
  const sx=Math.random()*innerWidth*.75, sy=Math.random()*innerHeight*.25;
  s.style.cssText=`position:fixed;width:3px;height:3px;background:#fff;border-radius:50%;left:${sx}px;top:${sy}px;z-index:2;pointer-events:none;transition:none;`;
  t.style.cssText=`position:fixed;width:60px;height:1.5px;background:linear-gradient(90deg,rgba(255,255,255,.85),rgba(201,169,110,.4),transparent);border-radius:2px;left:${sx}px;top:${sy}px;transform:rotate(32deg);transform-origin:left center;z-index:2;pointer-events:none;`;

}

  // --- WINDOW EXPORTS ---
  window.App = { 
      doAuth, toggleAuthMode, setLang, showView, startNew, cancelEdit, updateFamilyName, applyUrl, handleFile, 
      applyUrlSp, handleFileSp, saveMember, delMember, doLogout, modifyUser, generateShareLink, exportTree, 
      handleSearch, setTheme, openProfile, closeProfile, saveBgSettings, clearBgSettings, 
      handleBgFile, handleDropZoneOver, handleDropZoneLeave, handleDropZoneDrop, liveUpdateBg: () => { applyBgSettings(); refreshStudioPreview(); }, 
      handleGalleryFiles, removeGalleryImg, updateLayer, removeLayer,
      addTextLayer, updateTextLayer, removeTextLayer, saveTextSettings,
      openAssignModal, closeAssignModal, saveAssignments, openEditorFromModal, toggleAccordionMode, filterAdmin, filterAuth
  };
  
 checkLocalAuth();

  (function(){
    const c=document.getElementById('ptcl'),ctx=c.getContext('2d');
    function rsz(){c.width=innerWidth;c.height=innerHeight;}
    rsz();window.addEventListener('resize',rsz);
    const P=Array.from({length:45},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.6+0.2,vx:(Math.random()-.5)*.28,vy:-(Math.random()*.38+.08),a:Math.random()*.45+.07,da:(Math.random()-.5)*.0035,gold:Math.random()>.25}));

  })();
