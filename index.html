<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500&family=Noto+Sans+Devanagari:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a0f;
  --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --surface3:rgba(255,255,255,0.10);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.15);
  --text:#f0ede8;
  --text2:#a09a90;
  --text3:#5a5650;
  --gold:#c9a96e;
  --gold2:#e8c98a;
  --gold-soft:rgba(201,169,110,0.12);
  --red-soft:rgba(220,60,60,0.12);
}
html,body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
.lang-hi{font-family:'Noto Sans Devanagari',sans-serif!important}

/* BG */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-canvas::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(201,169,110,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(120,100,200,0.06) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 50% 50%,rgba(201,169,110,0.03) 0%,transparent 70%);animation:bgP 12s ease-in-out infinite alternate}
.bg-canvas::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(201,169,110,0.15) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);opacity:.3;animation:gD 20s linear infinite}
@keyframes bgP{0%{opacity:.7;transform:scale(1)}100%{opacity:1;transform:scale(1.05)}}
@keyframes gD{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:oF linear infinite;opacity:.4}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(201,169,110,0.2),transparent 70%);top:-100px;left:-100px;animation-duration:25s}
.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(100,80,180,0.15),transparent 70%);bottom:10%;right:-50px;animation-duration:30s;animation-delay:-10s}
.orb3{width:200px;height:200px;background:radial-gradient(circle,rgba(201,169,110,0.12),transparent 70%);top:50%;left:60%;animation-duration:20s;animation-delay:-5s}
@keyframes oF{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.1)}66%{transform:translate(-20px,30px) scale(.9)}}

/* NAV */
.nav{position:relative;z-index:10;display:flex;align-items:center;padding:0 2rem;border-bottom:1px solid var(--border);background:rgba(8,10,15,0.85);backdrop-filter:blur(20px);gap:.25rem;flex-wrap:wrap}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--gold);letter-spacing:.1em;margin-right:auto;padding:1rem 0;font-style:italic;cursor:pointer}
.nav-brand span{font-style:normal;font-weight:500;color:var(--text)}
.nav-tab{padding:.9rem 1.1rem;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--text3);border:none;background:none;border-bottom:1px solid transparent;margin-bottom:-1px;transition:all .2s;font-family:'Outfit',sans-serif;font-weight:400}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-tab:hover:not(.active){color:var(--text2)}

/* LANG TOGGLE */
.lang-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-left:.5rem}
.lang-btn{padding:.35rem .75rem;font-size:11px;letter-spacing:.06em;cursor:pointer;border:none;background:none;color:var(--text3);font-family:'Outfit',sans-serif;transition:all .2s}
.lang-btn.active{background:var(--gold);color:#0d0a04;font-weight:500}

/* LOGIN */
#login-overlay{position:fixed;inset:0;z-index:100;background:rgba(8,10,15,0.97);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.login-box{background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:20px;padding:2.5rem 2rem;width:320px;text-align:center}
.login-box .logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold);font-style:italic;margin-bottom:.25rem}
.login-box .logo span{font-style:normal;color:var(--text)}
.login-box p{font-size:12px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2rem}
.pin-dots{display:flex;gap:12px;justify-content:center;margin-bottom:1.5rem}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1px solid var(--border2);background:transparent;transition:all .2s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(201,169,110,0.4)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.pin-key{padding:.85rem;border-radius:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:18px;font-weight:400;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif}
.pin-key:hover{background:var(--surface3);border-color:var(--border2)}
.pin-key:active{transform:scale(.95)}
.pin-key.del{font-size:14px;color:var(--text3)}
.pin-error{font-size:12px;color:#f09595;margin-top:.5rem;min-height:18px;transition:opacity .2s}
.pin-hint{font-size:11px;color:var(--text3);margin-top:.75rem}

/* TREE */
#tree-view{position:relative;z-index:1;padding:2.5rem 1.5rem;min-height:560px}
.tree-header{text-align:center;margin-bottom:2.5rem}
.tree-header h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;color:var(--text);letter-spacing:.05em;line-height:1.2}
.tree-header h1 em{color:var(--gold);font-style:italic}
.tree-header p{font-size:12px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:.5rem}
.tree-container{overflow-x:auto;padding-bottom:1rem}
.person-card{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;padding:10px 10px 8px;border-radius:16px;transition:background .2s,border .2s,transform .15s;border:1px solid transparent}
.person-card:hover{background:var(--surface2);border-color:var(--border2);transform:translateY(-2px)}
.person-card.selected{background:var(--gold-soft);border-color:rgba(201,169,110,0.3)}
.person-card.spouse-card{cursor:default;opacity:.85}
.person-card.spouse-card:hover{background:transparent;border-color:transparent;transform:none}
.avatar{border-radius:50%;border:2px solid var(--border2);flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:400;color:var(--text2);overflow:hidden;transition:border-color .2s}
.person-card:hover .avatar,.person-card.selected .avatar{border-color:var(--gold)}
.avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.person-name{font-size:11px;color:var(--text2);margin-top:6px;text-align:center;max-width:90px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em}
.person-name.primary{color:var(--text);font-size:12px;font-weight:500}
.spouse-label{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.expand-indicator{width:4px;height:4px;border-radius:50%;margin:4px auto 0;transition:all .2s}
.expand-indicator.has-kids{background:var(--gold);box-shadow:0 0 6px var(--gold)}
.expand-indicator.expanded{background:var(--gold2)}
.connector-v{width:1px;background:linear-gradient(to bottom,var(--border2),var(--border));margin:0 auto}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.person-card{animation:fadeIn .3s ease both}

/* ADMIN */
#admin-view{position:relative;z-index:1;padding:1.5rem;display:grid;grid-template-columns:280px 1fr;gap:1.5rem;min-height:560px}
.admin-sidebar{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem;overflow-y:auto;max-height:580px;backdrop-filter:blur(10px)}
.admin-sidebar h3{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:1rem}
.member-list-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.member-list-item:hover,.member-list-item.active{background:var(--surface2);border-color:var(--border)}
.mini-av{width:34px;height:34px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);flex-shrink:0;overflow:hidden}
.mini-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.member-list-item-name{font-size:13px;color:var(--text)}
.member-list-item-role{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.add-btn{width:100%;margin-top:1rem;padding:.6rem;border-radius:10px;background:var(--gold-soft);border:1px solid rgba(201,169,110,0.25);color:var(--gold);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;letter-spacing:.05em}
.add-btn:hover{background:rgba(201,169,110,0.18);border-color:rgba(201,169,110,0.4)}
.logout-btn{width:100%;margin-top:.5rem;padding:.5rem;border-radius:10px;background:transparent;border:1px solid var(--border);color:var(--text3);font-size:11px;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;letter-spacing:.05em}
.logout-btn:hover{border-color:rgba(220,60,60,0.4);color:#f09595}
.admin-form{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem;backdrop-filter:blur(10px)}
.admin-form h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;margin-bottom:1.5rem;color:var(--text);letter-spacing:.03em}

/* FAMILY NAME EDITOR */
.family-name-section{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem}
.family-name-section label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
.family-name-section input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-size:16px;font-family:'Cormorant Garamond',serif;font-style:italic;padding:.25rem .25rem;outline:none;transition:border .2s}
.family-name-section input:focus{border-bottom-color:var(--gold)}
.fn-save-btn{padding:.35rem .85rem;border-radius:8px;background:var(--gold-soft);border:1px solid rgba(201,169,110,0.3);color:var(--gold);font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;transition:all .2s}
.fn-save-btn:hover{background:rgba(201,169,110,0.2)}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.form-group input,.form-group select{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:9px;padding:.55rem .85rem;color:var(--text);font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:border .2s,background .2s;height:38px}
.form-group input:focus,.form-group select:focus{border-color:rgba(201,169,110,0.4);background:rgba(255,255,255,0.06)}
.form-group input::placeholder{color:var(--text3)}
.form-group select option{background:#0d0f15}
.photo-row{display:flex;gap:1rem;align-items:flex-start}
.photo-prev{width:76px;height:76px;border-radius:50%;background:var(--surface2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);flex-shrink:0;overflow:hidden}
.photo-prev img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.photo-inputs{flex:1;display:flex;flex-direction:column;gap:.5rem}
.url-row{display:flex;gap:.5rem}
.url-row input{flex:1}
.apply-btn{padding:0 .85rem;height:38px;border-radius:9px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Outfit',sans-serif;transition:all .2s}
.apply-btn:hover{border-color:rgba(201,169,110,.4);color:var(--gold)}
.upload-label{padding:.5rem .85rem;border-radius:9px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:12px;cursor:pointer;text-align:center;transition:all .2s;display:block}
.upload-label:hover{border-color:var(--border2);color:var(--text)}
.form-actions{display:flex;gap:.75rem;margin-top:1.5rem;justify-content:flex-end;align-items:center}
.btn-save{padding:.55rem 1.5rem;border-radius:9px;background:var(--gold);border:none;color:#0d0a04;font-size:13px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-save:hover{background:var(--gold2)}
.btn-delete{padding:.55rem 1rem;border-radius:9px;background:transparent;border:1px solid var(--border2);color:var(--text3);font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-delete:hover{border-color:rgba(242,80,80,0.4);color:#f09595}
.btn-cancel{padding:.55rem 1rem;border-radius:9px;background:transparent;border:1px solid var(--border);color:var(--text3);font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-cancel:hover{color:var(--text2);border-color:var(--border2)}
.empty-form{display:flex;align-items:center;justify-content:center;height:220px;color:var(--text3);font-size:14px;flex-direction:column;gap:.75rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:rgba(201,169,110,0.15);border:1px solid rgba(201,169,110,0.3);color:var(--gold);padding:.6rem 1.25rem;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;backdrop-filter:blur(10px)}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-box">
    <div class="logo"><em>family</em> <span>tree</span></div>
    <p id="login-sub">admin access</p>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
      <div class="pin-dot" id="d4"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key del" onclick="pinKey('clear')">clear</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key del" onclick="pinKey('del')">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-hint">enter your 5-digit PIN to manage the family tree</div>
  </div>
</div>

<nav class="nav" id="main-nav" style="display:none">
  <span class="nav-brand" id="nav-brand"><em>family</em> <span id="brand-name">tree</span></span>
  <button class="nav-tab active" id="tab-tree" onclick="showView('tree',this)">family tree</button>
  <button class="nav-tab" id="tab-admin" onclick="showView('admin',this)">admin panel</button>
  <div class="lang-toggle">
    <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="lang-hi" onclick="setLang('hi')">हि</button>
  </div>
</nav>

<div id="tree-view" style="display:none"></div>
<div id="admin-view" style="display:none"></div>
<div class="toast" id="toast"></div>

<script>
/* ── CONFIG ── */
const CORRECT_PIN = '13579';

/* ── STATE ── */
let currentLang = 'en';
let familyName = 'Shah';
let adminUnlocked = false;

const T = {
  en: {
    familyTitle: () => `The <em>${familyName}</em> Family`,
    clickHint: 'click a name to expand their lineage',
    spouse: 'spouse',
    navTree: 'family tree',
    navAdmin: 'admin panel',
    addMember: '+ add new member',
    logout: 'log out',
    allMembers: 'all members',
    root: 'root',
    descendant: 'descendant',
    editMember: 'edit member',
    newMember: 'new member',
    photo: 'photo',
    firstName: 'first name',
    lastName: 'last name',
    parent: 'parent',
    generation: 'generation level',
    spouseName: 'spouse / partner name',
    rootLevel: '— root (top level) —',
    genLabels: ['root','children','grandchildren','great-grandchildren','gen 4+'],
    save: 'save',
    cancel: 'cancel',
    delete: 'delete',
    selectOrAdd: 'select a member or add new',
    savedMsg: 'saved',
    deletedMsg: 'deleted',
    familyNameLabel: 'family name',
    updateName: 'update',
    pasteUrl: 'paste image URL…',
    applyUrl: 'apply',
    uploadFile: 'upload file',
    leaveBlank: 'leave blank if none',
    loginSub: 'admin access',
    loginHint: 'enter your 5-digit PIN to manage the family tree',
    wrongPin: 'incorrect PIN, try again',
  },
  hi: {
    familyTitle: () => `<em>${familyName}</em> परिवार`,
    clickHint: 'वंशावली देखने के लिए नाम पर क्लिक करें',
    spouse: 'पति/पत्नी',
    navTree: 'परिवार वृक्ष',
    navAdmin: 'व्यवस्थापक',
    addMember: '+ सदस्य जोड़ें',
    logout: 'लॉग आउट',
    allMembers: 'सभी सदस्य',
    root: 'मूल',
    descendant: 'वंशज',
    editMember: 'सदस्य संपादित करें',
    newMember: 'नया सदस्य',
    photo: 'फ़ोटो',
    firstName: 'पहला नाम',
    lastName: 'अंतिम नाम',
    parent: 'अभिभावक',
    generation: 'पीढ़ी स्तर',
    spouseName: 'पति/पत्नी का नाम',
    rootLevel: '— मूल (शीर्ष स्तर) —',
    genLabels: ['मूल','बच्चे','पोते-पोती','परपोते-परपोती','पीढ़ी 4+'],
    save: 'सहेजें',
    cancel: 'रद्द करें',
    delete: 'हटाएं',
    selectOrAdd: 'सदस्य चुनें या नया जोड़ें',
    savedMsg: 'सहेजा गया',
    deletedMsg: 'हटाया गया',
    familyNameLabel: 'परिवार का नाम',
    updateName: 'अपडेट',
    pasteUrl: 'छवि URL पेस्ट करें…',
    applyUrl: 'लागू करें',
    uploadFile: 'फ़ाइल अपलोड करें',
    leaveBlank: 'नहीं है तो खाली छोड़ें',
    loginSub: 'व्यवस्थापक प्रवेश',
    loginHint: '5-अंकीय PIN दर्ज करें',
    wrongPin: 'गलत PIN, पुनः प्रयास करें',
  }
};

function t(key){ return T[currentLang][key] || T.en[key] }

/* ── PIN ── */
let pinEntry = '';
function pinKey(k){
  const err = document.getElementById('pin-error');
  err.textContent = '';
  if(k==='clear'){ pinEntry=''; }
  else if(k==='del'){ pinEntry=pinEntry.slice(0,-1); }
  else if(pinEntry.length < 5){ pinEntry += k; }
  updateDots();
  if(pinEntry.length === 5){ checkPin(); }
}
function updateDots(){
  for(let i=0;i<5;i++){
    document.getElementById('d'+i).classList.toggle('filled', i < pinEntry.length);
  }
}
function checkPin(){
  if(pinEntry === CORRECT_PIN){
    adminUnlocked = true;
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('tree-view').style.display = '';
    renderTree();
    applyLang();
  } else {
    document.getElementById('pin-error').textContent = t('wrongPin');
    pinEntry = '';
    updateDots();
    const dots = document.getElementById('pin-dots');
    dots.style.animation = 'none';
    dots.offsetHeight;
    dots.style.animation = 'shake .3s ease';
  }
}
const shakeKf = document.createElement('style');
shakeKf.textContent='@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}';
document.head.appendChild(shakeKf);

/* ── LANG ── */
function setLang(l){
  currentLang = l;
  document.getElementById('lang-en').classList.toggle('active', l==='en');
  document.getElementById('lang-hi').classList.toggle('active', l==='hi');
  applyLang();
  const tv = document.getElementById('tree-view');
  const av = document.getElementById('admin-view');
  if(tv.style.display !== 'none') renderTree();
  if(av.style.display !== 'none') renderAdmin();
}
function applyLang(){
  document.getElementById('tab-tree').textContent = t('navTree');
  document.getElementById('tab-admin').textContent = t('navAdmin');
  const loginSub = document.getElementById('login-sub');
  if(loginSub) loginSub.textContent = t('loginSub');
  if(currentLang === 'hi'){
    document.body.classList.add('lang-hi');
  } else {
    document.body.classList.remove('lang-hi');
  }
}

function getPrimaries(pid=null){return DB.members.filter(m=>m.parentId===pid&&!m.isSpouse)}
function getSpouse(m){return m.spouse?DB.members.find(s=>s.id===m.spouse)||null:null}
function getChildren(m){return DB.members.filter(x=>x.parentId===m.id&&!x.isSpouse)}
function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function displayName(m){ return currentLang==='hi' && m.nameHi ? m.nameHi : m.name }

function scaleSz(gen){return [76,62,52,44,38,32][Math.min(gen,5)]}
function scaleFs(gen){return [13,12,11,11,11,11][Math.min(gen,5)]}
function scalePad(gen){return [12,10,8,6,5,4][Math.min(gen,5)]}

function makeAvatar(m,sz){
  const av=document.createElement('div');
  av.className='avatar';
  av.style.cssText=`width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.27)}px`;
  if(m.photo){
    const img=document.createElement('img');img.src=m.photo;img.alt=m.name;
    img.onerror=()=>{av.textContent=initials(m.name)};
    av.appendChild(img);
  } else { av.textContent=initials(m.name); }
  return av;
}

function renderTree(){
  const tv=document.getElementById('tree-view');
  tv.innerHTML=`
    <div class="tree-header${currentLang==='hi'?' lang-hi':''}">
      <h1>${t('familyTitle')()}</h1>
      <p>${t('clickHint')}</p>
    </div>
    <div class="tree-container"><div id="tree-root" style="display:flex;flex-direction:column;align-items:center;gap:0;padding:0 1rem 2rem"></div></div>`;
  renderLevel(document.getElementById('tree-root'),null,0);
}

function renderLevel(parent,parentId,gen){
  const prim=getPrimaries(parentId);
  if(!prim.length) return;
  const sz=scaleSz(gen),fs=scaleFs(gen),pad=scalePad(gen);
  const row=document.createElement('div');
  row.style.cssText='display:flex;gap:0;justify-content:center;align-items:flex-start;flex-wrap:wrap';
  prim.forEach(m=>{
    const col=document.createElement('div');
    col.style.cssText='display:flex;flex-direction:column;align-items:center';
    const sp=getSpouse(m),kids=getChildren(m),exp=DB.expanded.has(m.id);
    const couple=document.createElement('div');
    couple.style.cssText='display:flex;align-items:flex-start;gap:0';
    couple.appendChild(buildCard(m,sz,fs,pad,kids.length>0,exp,false));
    if(sp){
      const conn=document.createElement('div');
      conn.style.cssText=`display:flex;align-items:center;padding-top:${Math.round(sz/2-4)}px`;
      conn.innerHTML=`<svg width="22" height="2"><line x1="0" y1="1" x2="22" y2="1" stroke="rgba(201,169,110,0.35)" stroke-width="1" stroke-dasharray="3,2"/></svg>`;
      couple.appendChild(conn);
      couple.appendChild(buildCard(sp,sz,fs,pad,false,false,true));
    }
    col.appendChild(couple);
    if(kids.length&&exp){
      const vl=document.createElement('div');
      vl.className='connector-v';vl.style.height='20px';
      col.appendChild(vl);
      const cr=document.createElement('div');
      cr.style.cssText='display:flex;gap:0;justify-content:center;align-items:flex-start';
      renderLevel(cr,m.id,gen+1);
      col.appendChild(cr);
    }
    row.appendChild(col);
  });
  parent.appendChild(row);
}

function buildCard(m,sz,fs,pad,hasKids,isExp,isSpouse){
  const card=document.createElement('div');
  card.className='person-card'+(isSpouse?' spouse-card':'')+(m.id===DB.selected?' selected':'');
  card.style.cssText=`padding:${pad}px ${Math.max(4,pad-2)}px;animation-delay:${Math.random()*0.15}s`;
  card.appendChild(makeAvatar(m,sz));
  const nm=document.createElement('div');
  nm.className='person-name'+(isSpouse?'':' primary')+(currentLang==='hi'?' lang-hi':'');
  nm.style.cssText=`font-size:${fs}px;max-width:${sz+24}px`;
  nm.textContent=displayName(m);
  card.appendChild(nm);
  if(isSpouse){
    const sl=document.createElement('div');
    sl.className='spouse-label'+(currentLang==='hi'?' lang-hi':'');
    sl.textContent=t('spouse');
    card.appendChild(sl);
  }
  if(hasKids&&!isSpouse){
    const dot=document.createElement('div');
    dot.className='expand-indicator'+(hasKids?' has-kids':'')+(isExp?' expanded':'');
    card.appendChild(dot);
  }
  if(!isSpouse){
    card.onclick=()=>{
      if(hasKids){DB.expanded.has(m.id)?DB.expanded.delete(m.id):DB.expanded.add(m.id)}
      DB.selected=m.id; renderTree();
    };
  }
  return card;
}

/* ── ADMIN ── */
let editingId=null,prevPhoto='';

function renderAdmin(){
  const v=document.getElementById('admin-view');
  const hi=currentLang==='hi';
  v.innerHTML=`
    <div class="admin-sidebar${hi?' lang-hi':''}">
      <h3>${t('allMembers')}</h3>
      <div id="mlist"></div>
      <button class="add-btn" onclick="startNew()${hi?'':''}">${t('addMember')}</button>
      <button class="logout-btn" onclick="doLogout()">${t('logout')}</button>
    </div>
    <div class="admin-form${hi?' lang-hi':''}" id="aform">
      <div class="family-name-section">
        <label>${t('familyNameLabel')}</label>
        <input type="text" id="fn-input" value="${familyName}" placeholder="Family name">
        <button class="fn-save-btn" onclick="updateFamilyName()">${t('updateName')}</button>
      </div>
      <div class="empty-form">
        <div style="opacity:.3"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
        <span>${t('selectOrAdd')}</span>
      </div>
    </div>`;
  const list=document.getElementById('mlist');
  DB.members.filter(m=>!m.isSpouse).forEach(m=>{
    const it=document.createElement('div');
    it.className='member-list-item'+(editingId===m.id?' active':'');
    const avHtml=m.photo?`<img src="${m.photo}" onerror="this.parentElement.textContent='${initials(m.name)}'">`:`${initials(m.name)}`;
    it.innerHTML=`<div class="mini-av">${avHtml}</div><div><div class="member-list-item-name">${displayName(m)}</div><div class="member-list-item-role">${m.parentId?t('descendant'):t('root')}</div></div>`;
    it.onclick=()=>{editingId=m.id;prevPhoto=m.photo||'';renderAdmin();renderForm(m)};
    list.appendChild(it);
  });
  if(editingId){const m=DB.members.find(x=>x.id===editingId);if(m)renderForm(m);}
}

function updateFamilyName(){
  const val=document.getElementById('fn-input').value.trim();
  if(!val) return;
  familyName=val;
  document.getElementById('brand-name').textContent=val;
  showToast(t('savedMsg'));
  renderTree();
}

function startNew(){editingId='__new__';prevPhoto='';renderAdmin();renderForm(null)}

function renderForm(m){
  const area=document.getElementById('aform');
  const hi=currentLang==='hi';
  const pOpts=`<option value="">${t('rootLevel')}</option>`+DB.members.filter(x=>!x.isSpouse&&(!m||x.id!==m.id)).map(p=>`<option value="${p.id}" ${m&&m.parentId===p.id?'selected':''}>${displayName(p)}</option>`).join('');
  const spN=m&&m.spouse?DB.members.find(x=>x.id===m.spouse)?.name||'':'';
  const spNHi=m&&m.spouse?DB.members.find(x=>x.id===m.spouse)?.nameHi||'':'';
  const pv=prevPhoto;
  const genOpts=t('genLabels').map((g,i)=>`<option value="${i}" ${m&&m.generation===i?'selected':''}>${g}</option>`).join('');
  area.innerHTML=`
    <div class="family-name-section">
      <label>${t('familyNameLabel')}</label>
      <input type="text" id="fn-input" value="${familyName}" placeholder="Family name">
      <button class="fn-save-btn" onclick="updateFamilyName()">${t('updateName')}</button>
    </div>
    <h2 class="${hi?'lang-hi':''}">${m?t('editMember'):t('newMember')}</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label class="${hi?'lang-hi':''}">${t('photo')}</label>
        <div class="photo-row">
          <div class="photo-prev" id="pp">${pv?`<img src="${pv}">`:`<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`}</div>
          <div class="photo-inputs">
            <div class="url-row"><input type="text" id="p-url" placeholder="${t('pasteUrl')}" value="${pv}"><button class="apply-btn" onclick="applyUrl()">${t('applyUrl')}</button></div>
            <label class="upload-label" for="p-file">${t('uploadFile')}</label>
            <input type="file" id="p-file" accept="image/*" style="display:none" onchange="handleFile(this)">
          </div>
        </div>
      </div>
      <div class="form-group"><label class="${hi?'lang-hi':''}">${t('firstName')} (EN)</label><input type="text" id="f-fn" placeholder="First name" value="${m?m.name.split(' ')[0]:''}"></div>
      <div class="form-group"><label class="${hi?'lang-hi':''}">${t('lastName')} (EN)</label><input type="text" id="f-ln" placeholder="Last name" value="${m?m.name.split(' ').slice(1).join(' '):''}"></div>
      <div class="form-group"><label>नाम (हिंदी)</label><input type="text" id="f-fn-hi" placeholder="पहला नाम" value="${m?m.nameHi?m.nameHi.split(' ')[0]:'':''}"></div>
      <div class="form-group"><label>उपनाम (हिंदी)</label><input type="text" id="f-ln-hi" placeholder="उपनाम" value="${m?m.nameHi?m.nameHi.split(' ').slice(1).join(' '):'':''}"></div>
      <div class="form-group"><label class="${hi?'lang-hi':''}">${t('parent')}</label><select id="f-par">${pOpts}</select></div>
      <div class="form-group"><label class="${hi?'lang-hi':''}">${t('generation')}</label><select id="f-gen">${genOpts}</select></div>
      <div class="form-group full"><label class="${hi?'lang-hi':''}">${t('spouseName')} (EN)</label><input type="text" id="f-sp" placeholder="${t('leaveBlank')}" value="${spN}"></div>
      <div class="form-group full"><label>पति/पत्नी (हिंदी)</label><input type="text" id="f-sp-hi" placeholder="खाली छोड़ें" value="${spNHi}"></div>
    </div>
    <div class="form-actions">
      ${m?`<button class="btn-delete${hi?' lang-hi':''}" onclick="delMember('${m.id}')">${t('delete')}</button>`:''}
      <button class="btn-cancel${hi?' lang-hi':''}" onclick="editingId=null;renderAdmin()">${t('cancel')}</button>
      <button class="btn-save${hi?' lang-hi':''}" onclick="saveMember()">${t('save')}</button>
    </div>`;
}

function applyUrl(){const url=document.getElementById('p-url').value.trim();prevPhoto=url;const pp=document.getElementById('pp');if(url){pp.innerHTML=`<img src="${url}" onerror="this.parentElement.textContent='?'">`}}
function handleFile(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{prevPhoto=e.target.result;document.getElementById('pp').innerHTML=`<img src="${e.target.result}">`;document.getElementById('p-url').value=''};r.readAsDataURL(f)}

function saveMember(){
  const fn=document.getElementById('f-fn').value.trim(),ln=document.getElementById('f-ln').value.trim();
  if(!fn){showToast('please enter a name');return}
  const name=ln?fn+' '+ln:fn;
  const fnHi=document.getElementById('f-fn-hi').value.trim(),lnHi=document.getElementById('f-ln-hi').value.trim();
  const nameHi=fnHi?(lnHi?fnHi+' '+lnHi:fnHi):'';
  const parentId=document.getElementById('f-par').value||null;
  const gen=parseInt(document.getElementById('f-gen').value);
  const spN=document.getElementById('f-sp').value.trim();
  const spNHi=document.getElementById('f-sp-hi').value.trim();
  if(editingId==='__new__'){
    const id='m'+Date.now();
    const nm={id,name,nameHi,photo:prevPhoto,parentId,generation:gen,spouse:'',isSpouse:false};
    DB.members.push(nm);
    if(spN){const sid=id+'s';nm.spouse=sid;DB.members.push({id:sid,name:spN,nameHi:spNHi,photo:'',parentId:null,generation:gen,spouse:id,isSpouse:true,linkedTo:id})}
    editingId=id;
  } else {
    const m=DB.members.find(x=>x.id===editingId);
    Object.assign(m,{name,nameHi,photo:prevPhoto,parentId,generation:gen});
    if(spN){
      if(m.spouse){const s=DB.members.find(x=>x.id===m.spouse);if(s){s.name=spN;s.nameHi=spNHi}}
      else{const sid=m.id+'s';m.spouse=sid;DB.members.push({id:sid,name:spN,nameHi:spNHi,photo:'',parentId:null,generation:gen,spouse:m.id,isSpouse:true,linkedTo:m.id})}
    } else if(m.spouse){DB.members=DB.members.filter(x=>x.id!==m.spouse);m.spouse=''}
  }
  showToast(t('savedMsg'));renderAdmin();renderTree();
}

function delMember(id){
  const m=DB.members.find(x=>x.id===id);
  if(m?.spouse)DB.members=DB.members.filter(x=>x.id!==m.spouse);
  DB.members.filter(x=>x.parentId===id).forEach(c=>c.parentId=null);
  DB.members=DB.members.filter(x=>x.id!==id);
  editingId=null;showToast(t('deletedMsg'));renderAdmin();renderTree();
}

function doLogout(){
  adminUnlocked=false;pinEntry='';updateDots();
  document.getElementById('pin-error').textContent='';
  document.getElementById('login-overlay').style.display='flex';
  document.getElementById('main-nav').style.display='none';
  document.getElementById('tree-view').style.display='none';
  document.getElementById('admin-view').style.display='none';
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

function showView(v,btn){
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
  if(v==='tree'){
    document.getElementById('tree-view').style.display='';
    document.getElementById('admin-view').style.display='none';
    renderTree();
  } else {
    document.getElementById('tree-view').style.display='none';
    document.getElementById('admin-view').style.display='grid';
    renderAdmin();
  }
}
</script>
