<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Outfit:wght@300;400;500&family=Noto+Sans+Devanagari:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── THEME ENGINE ── */
:root {
  --bg: #080a0f; --surface: rgba(255,255,255,0.04); --surface2: rgba(255,255,255,0.07);
  --surface3: rgba(255,255,255,0.10); --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
  --text: #f0ede8; --text2: #a09a90; --text3: #5a5650;
  --gold: #c9a96e; --gold2: #e8c98a; --gold-soft: rgba(201,169,110,0.12);
  --canvas-filter: none;
}
body.theme-light {
  --bg: #f9f8f6; --surface: #ffffff; --surface2: #f0edea; --surface3: #e6e2dd;
  --border: #e0ddd9; --border2: #d0cdc9;
  --text: #2a2825; --text2: #4a4845; --text3: #7a7875;
  --gold: #b38b4d; --gold2: #967035; --gold-soft: rgba(179,139,77,0.15);
  --canvas-filter: invert(1) hue-rotate(180deg) opacity(0.3);
}
body.theme-vintage {
  --bg: #eaddcf; --surface: #f4ecd8; --surface2: #e8dcc4; --surface3: #dfd1b3;
  --border: #d4c4b4; --border2: #c2b09d;
  --text: #4a3b2c; --text2: #5c4d3c; --text3: #7a6b5c;
  --gold: #9e643c; --gold2: #7d4d2b; --gold-soft: rgba(158,100,60,0.15);
  --canvas-filter: sepia(0.4) opacity(0.4);
}

html,body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden; transition: background 0.3s, color 0.3s;}
.lang-hi *{font-family:'Noto Sans Devanagari',sans-serif}

.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none; filter: var(--canvas-filter); transition: filter 0.3s;}
.bg-canvas::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(201,169,110,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(120,100,200,0.06) 0%,transparent 60%);animation:bgP 12s ease-in-out infinite alternate}
.bg-canvas::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(201,169,110,0.15) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);opacity:.3;animation:gD 20s linear infinite}
@keyframes bgP{0%{opacity:.7}100%{opacity:1}}
@keyframes gD{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
.orb{position:absolute;border-radius:50%;filter:blur(80px);animation:oF linear infinite;opacity:.4}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(201,169,110,0.2),transparent 70%);top:-100px;left:-100px;animation-duration:25s}
.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(100,80,180,0.15),transparent 70%);bottom:10%;right:-50px;animation-duration:30s;animation-delay:-10s}
.orb3{width:200px;height:200px;background:radial-gradient(circle,rgba(201,169,110,0.12),transparent 70%);top:50%;left:60%;animation-duration:20s;animation-delay:-5s}
@keyframes oF{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.1)}66%{transform:translate(-20px,30px) scale(.9)}}

/* STYLED DROPDOWNS */
select {
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23c9a96e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 14px;
  padding-right: 32px !important;
}
select option {
  background-color: var(--bg);
  color: var(--text);
}

/* NAV */
.nav{position:relative;z-index:10;display:flex;align-items:center;padding:0 2rem;border-bottom:1px solid var(--border);background:var(--bg);backdrop-filter:blur(20px);flex-wrap:wrap; opacity:0.95;}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--gold);letter-spacing:.1em;margin-right:auto;padding:1rem 0;font-style:italic}
.nav-brand span{font-style:normal;font-weight:500;color:var(--text)}
.nav-tab{padding:.9rem 1.1rem;font-size:12px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;color:var(--text3);border:none;background:none;border-bottom:1px solid transparent;margin-bottom:-1px;transition:all .2s;font-family:'Outfit',sans-serif}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-tab:hover:not(.active){color:var(--text2)}
.lang-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-left:.5rem}
.lang-btn{padding:.35rem .75rem;font-size:11px;cursor:pointer;border:none;background:none;color:var(--text3);font-family:'Outfit',sans-serif;transition:all .2s}
.lang-btn.active{background:var(--gold);color:#ffffff;font-weight:500}

/* AUTHENTICATION OVERLAY */
#login-overlay, #waiting-overlay{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center; flex-direction:column;}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:2.5rem 2rem;width:340px;text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold);font-style:italic;margin-bottom:.25rem}
.login-logo span{font-style:normal;color:var(--text)}
.login-sub{font-size:12px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:2rem}
.auth-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.8rem 1rem; color: var(--text); font-size: 14px; font-family: 'Outfit', sans-serif; outline: none; margin-bottom: 1rem; transition: border 0.2s;}
.auth-input:focus { border-color: var(--gold); }
.auth-btn { width: 100%; padding: 0.8rem; border-radius: 10px; background: var(--gold); border: none; color: #0d0a04; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Outfit', sans-serif; transition: all 0.2s; margin-bottom: 0.5rem;}
.auth-btn:hover { background: var(--gold2); }
.auth-btn-sec { width: 100%; padding: 0.8rem; border-radius: 10px; background: transparent; border: 1px solid var(--border2); color: var(--text3); font-size: 13px; cursor: pointer; font-family: 'Outfit', sans-serif; transition: all 0.2s;}
.auth-btn-sec:hover { border-color: var(--gold); color: var(--gold); }
.auth-error { color: #f09595; font-size: 12px; margin-bottom: 1rem; min-height: 15px; }

/* TREE VIEWER & TOOLBAR */
#tree-view{position:relative;z-index:1;padding:1.5rem 1.5rem;min-height:560px}
.tree-header{text-align:center;margin-bottom:1.5rem}
.tree-header h1{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;letter-spacing:.05em;line-height:1.2}
.tree-header h1 em{color:var(--gold);font-style:italic}
.tree-header p{font-size:12px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-top:.5rem}

.tree-toolbar { display: flex; justify-content: center; gap: 10px; margin-bottom: 2rem; flex-wrap: wrap; }
.tool-input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: 20px; font-family: 'Outfit', sans-serif; font-size: 12px; outline: none; width: 200px; transition: border 0.2s; }
.tool-input:focus { border-color: var(--gold); }
.tool-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 1rem; border-radius: 20px; font-family: 'Outfit', sans-serif; font-size: 12px; outline: none; cursor: pointer; }
.tool-btn { background: var(--gold-soft); border: 1px solid rgba(201,169,110,0.3); color: var(--gold); padding: 0.5rem 1.2rem; border-radius: 20px; font-family: 'Outfit', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight:500;}
.tool-btn:hover { background: var(--gold); color: #fff; }

/* THE BULLETPROOF SCROLL FIX: Text-align allows perfect centering when small, but natural left-pinning when large */
.tree-container { overflow-x: auto; padding-bottom: 2rem; width: 100%; text-align: center; -webkit-overflow-scrolling: touch; transition: opacity 0.3s; }
#tree-root { display: inline-flex; flex-direction: column; align-items: center; padding: 1rem 2rem; min-width: max-content; background: transparent; border-radius: 12px; text-align: left; }

.person-card{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;border-radius:16px;transition:all .3s;border:1px solid transparent}
.person-card:hover:not(.view-only){background:var(--surface2);border-color:var(--border2);transform:translateY(-2px)}
.person-card.selected{background:var(--gold-soft);border-color:rgba(201,169,110,0.3)}
.person-card.spouse-card{cursor:default;opacity:.85}
.person-card.spouse-card:hover{background:transparent;border-color:transparent;transform:none}
.avatar{border-radius:50%;border:2px solid var(--border2);flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:400;color:var(--text2);overflow:hidden;transition:border-color .2s}
.person-card:hover:not(.view-only) .avatar,.person-card.selected .avatar{border-color:var(--gold)}
.avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}

/* THE ULTRA-THICK TEXT HALO MASK */
.person-name span, .spouse-label span, .date-label {
  position: relative;
  z-index: 5;
  text-shadow: 
    -3px -3px 0 var(--bg), 3px -3px 0 var(--bg), 
    -3px 3px 0 var(--bg), 3px 3px 0 var(--bg),
    -3px 0 0 var(--bg), 3px 0 0 var(--bg),
    0 -3px 0 var(--bg), 0 3px 0 var(--bg),
    0 0 10px var(--bg), 0 0 15px var(--bg);
}

.person-name{color:var(--text2);text-align:center;}
.person-name.primary{color:var(--text);font-weight:500;}
.spouse-label{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;}
.date-label{font-size:10px;color:var(--text3); margin-top:2px; font-family:'Outfit';}
.expand-dot{width:4px;height:4px;border-radius:50%;margin:0 auto;background:var(--gold);box-shadow:0 0 6px var(--gold);transition:all .2s}

/* --- TIGHT, GAPLESS TREE LINES --- */
.tree-row { display: flex; justify-content: center; position: relative; padding-top: 30px; }
.tree-col { display: flex; flex-direction: column; align-items: center; position: relative; padding: 20px 24px 0; } 
.tree-col::before { content: ''; position: absolute; top: 0; height: 2px; background: var(--gold); z-index: 0; }
.tree-col:first-child::before { left: calc(50% - var(--shift-x, 0px)); right: 0; }
.tree-col:last-child::before { left: 0; right: calc(50% + var(--shift-x, 0px)); }
.tree-col:not(:first-child):not(:last-child)::before { left: 0; right: 0; width: 100%; }
.tree-col:only-child::before { display: none; }
.tree-col::after { content: ''; position: absolute; top: 0; left: calc(50% - var(--shift-x, 0px)); width: 2px; height: 20px; background: var(--gold); transform: translateX(-50%); z-index: 0; }
#tree-root > .tree-row { padding-top: 0; }
#tree-root > .tree-row > .tree-col { padding-top: 0; }
#tree-root > .tree-row > .tree-col::before,
#tree-root > .tree-row > .tree-col::after { display: none; }

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.person-card{animation:fadeIn .25s ease both}

/* ADMIN & AUTH PANELS */
#admin-view, #auth-view{position:relative;z-index:1;padding:1.5rem;display:grid;grid-template-columns:280px 1fr;gap:1.5rem;min-height:560px;box-sizing:border-box}
.admin-sidebar{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.25rem;overflow-y:auto;max-height:650px}
.sidebar-title{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:1rem}
.member-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.member-item:hover,.member-item.active{background:var(--surface2);border-color:var(--border)}
.mini-av{width:34px;height:34px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);flex-shrink:0;overflow:hidden}
.mini-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.item-name{font-size:13px;color:var(--text)}
.item-role{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}

.sidebar-btn{width:100%;margin-top:.75rem;padding:.55rem;border-radius:10px;font-size:12px;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;letter-spacing:.04em}
.btn-add{background:var(--gold-soft);border:1px solid rgba(201,169,110,0.25);color:var(--gold)}
.btn-add:hover{background:rgba(201,169,110,0.18)}

.admin-form-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.75rem}
.admin-form-wrap h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;margin-bottom:1.25rem;color:var(--text)}

/* AUTH PANEL USERS LIST */
.user-card { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); padding: 1rem; border-radius: 12px; margin-bottom: 1rem;}
.user-info strong { font-size: 16px; color: var(--text); display: block; margin-bottom: 4px;}
.user-info span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 6px; border-radius: 4px; }
.status-pending { background: rgba(240, 150, 100, 0.15); color: #f0a864; border: 1px solid rgba(240, 150, 100, 0.3); }
.status-approved { background: rgba(100, 200, 120, 0.15); color: #64c878; border: 1px solid rgba(100, 200, 120, 0.3); }
.status-admin { background: var(--gold-soft); color: var(--gold); border: 1px solid rgba(201,169,110,0.3); }
.auth-actions { display: flex; gap: 0.5rem; }
.auth-act-btn { padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 11px; cursor: pointer; font-family: 'Outfit', sans-serif; border: 1px solid transparent; transition: all 0.2s;}
.btn-approve { background: rgba(100, 200, 120, 0.15); color: #64c878; border-color: rgba(100, 200, 120, 0.3); }
.btn-approve:hover { background: rgba(100, 200, 120, 0.25); }
.btn-promote { background: var(--gold-soft); color: var(--gold); border-color: rgba(201,169,110,0.3); }
.btn-promote:hover { background: rgba(201,169,110,0.25); }
.btn-revoke { background: transparent; border-color: var(--border2); color: var(--text3); }
.btn-revoke:hover { border-color: rgba(242,80,80,0.4); color: #f09595; }

/* SHARE LINK GENERATOR */
.share-generator { margin-top: 2rem; padding: 1.5rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; }
.share-generator h3 { font-family: 'Cormorant Garamond', serif; font-weight: 400; color: var(--gold); font-size: 20px; margin-bottom: 10px; }
.share-generator p { font-size: 12px; color: var(--text3); margin-bottom: 15px; }
.share-controls { display: flex; gap: 10px; align-items: center; }
.share-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.6rem 1rem; border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; cursor: pointer; transition: border 0.2s; }
.share-select:focus { border-color: var(--gold); }
.share-btn { padding: 0.6rem 1.4rem; background: var(--gold-soft); color: var(--gold); border: 1px solid rgba(201,169,110,0.3); border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.share-btn:hover { background: var(--gold); color: #fff; }

/* FORM STYLES */
.fn-bar{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:.85rem 1.1rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem}
.fn-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
.fn-input{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-size:16px;font-family:'Cormorant Garamond',serif;font-style:italic;padding:.2rem .25rem;outline:none;transition:border .2s}
.fn-input:focus{border-bottom-color:var(--gold)}
.fn-btn{padding:.3rem .85rem;border-radius:8px;background:var(--gold-soft);border:1px solid rgba(201,169,110,0.3);color:var(--gold);font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;white-space:nowrap}
.fn-btn:hover{background:rgba(201,169,110,0.2)}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.fg{display:flex;flex-direction:column;gap:6px}
.fg.full{grid-column:1/-1}
.fg label{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.1em;text-transform:uppercase}
.fg input,.fg select{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:.5rem .8rem;color:var(--text);font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:border .2s;height:36px}
.fg input:focus,.fg select:focus{border-color:rgba(201,169,110,0.4)}
.fg input::placeholder{color:var(--text3)}
.fg select option{background:var(--bg)}
.photo-row{display:flex;gap:1rem;align-items:flex-start}
.photo-prev{width:72px;height:72px;border-radius:50%;background:var(--surface2);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);flex-shrink:0;overflow:hidden}
.photo-prev img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.photo-inputs{flex:1;display:flex;flex-direction:column;gap:.5rem}
.url-row{display:flex;gap:.5rem}
.url-row input{flex:1}
.url-apply{padding:0 .8rem;height:36px;border-radius:9px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif}
.url-apply:hover{border-color:rgba(201,169,110,.4);color:var(--gold)}
.upload-lbl{display:block;padding:.45rem .8rem;border-radius:9px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:12px;cursor:pointer;text-align:center}
.form-actions{display:flex;gap:.75rem;margin-top:1.25rem;justify-content:flex-end;align-items:center}
.btn-save{padding:.5rem 1.4rem;border-radius:9px;background:var(--gold);border:none;color:#ffffff;font-size:13px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif; transition:all 0.2s;}
.btn-save:hover:not(:disabled){background:var(--gold2)}
.btn-save:disabled{opacity: 0.5; cursor: not-allowed;}
.btn-del{padding:.5rem 1rem;border-radius:9px;background:transparent;border:1px solid var(--border2);color:var(--text3);font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif}
.btn-del:hover{border-color:rgba(242,80,80,0.4);color:#f09595}
.btn-cancel{padding:.5rem 1rem;border-radius:9px;background:transparent;border:1px solid var(--border);color:var(--text3);font-size:13px;cursor:pointer;font-family:'Outfit',sans-serif}
.empty-state{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:14px;flex-direction:column;gap:.75rem}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg);border:1px solid rgba(201,169,110,0.3);color:var(--gold);padding:.55rem 1.2rem;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999; box-shadow: 0 4px 15px rgba(0,0,0,0.3);}
.toast.show{opacity:1}
.sync-pill{position:fixed;top:.75rem;left:50%;transform:translateX(-50%);background:var(--bg);border:1px solid var(--border2);padding:.3rem 1rem;border-radius:20px;font-size:11px;letter-spacing:.07em;z-index:200;transition:opacity .5s;pointer-events:none;opacity:0; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}

/* ── MOBILE RESPONSIVE ── */
@media (max-width: 768px) {
  #admin-view, #auth-view{ grid-template-columns:1fr; grid-template-rows:auto 1fr; padding:1rem .75rem; gap:1rem; }
  .admin-sidebar{max-height:220px;}
}
@media (max-width: 600px) {
  .nav{padding:0 1rem}
  .nav-brand{font-size:16px}
  .nav-tab{padding:.75rem .6rem;font-size:10px;letter-spacing:.04em}
  .lang-btn{padding:.3rem .5rem;font-size:10px}
  .login-box{width:90vw;padding:2rem 1.25rem}
  #tree-view{padding:1.5rem 0} 
  .tree-header h1{font-size:26px}
  
  .tree-container{text-align:left; padding: 0 1rem 2rem 1rem;} 
  .tree-col { padding: 20px 16px 0; } 
  .admin-form-wrap{padding:1.25rem}
  .form-grid{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .form-actions{flex-wrap:wrap;gap:.5rem}

<script>
(function() {

  const fbConfig = {

  /* ── MASTER ADMIN CREDENTIALS ── */
  const MASTER_USER = 'Kx393';

  const STRINGS = {
    en:{

      saved:'सहेजा गया',deleted:'हटाया गया',familyNameLabel:'परिवार का नाम',update:'अपडेट',
      pasteUrl:'छवि URL पेस्ट करें…',apply:'लागू करें',upload:'फ़ाइल अपलोड करें',blank:'खाली छोड़ें'
    }
  };

  /* ── APP STATE ── */
  var state = {
    lang: 'en',
    theme: 'dark',
    familyName: 'Shah',
    dbReady: false,
    members: [],
    expanded: {},
    users: {}, 
    currentUser: null, 
    authMode: 'login', 
    selected: null,
    editingId: null,
    prevPhoto: '',
    prevPhotoSpouse: '',
    isViewOnly: false,
    searchQuery: '', 
    filterMode: 'all' 
  };

  /* ── SECURITY HELPER ── */
  function isAdmin() {
      return state.currentUser && state.currentUser.role === 'admin' && !state.isViewOnly;
  }

  /* ── THEME ENGINE ── */
  function setTheme(t) {
      state.theme = t;
      document.body.className = '';
      if(t !== 'dark') document.body.classList.add('theme-' + t);
      localStorage.setItem('famTheme', t);
  }
  var savedTheme = localStorage.getItem('famTheme');
  if(savedTheme) {
      document.getElementById('theme-picker').value = savedTheme;
      setTheme(savedTheme);
  }

  /* ── RESPONSIVE MATH W/ TIGHT SPOUSE GAPS ── */
  function getSizes() {
    var w = window.innerWidth;
    // Reverted the connW to keep spouses tightly packed together
    if (w <= 480) return { sz: 44, fs: 10, pad: 4, cardW: 52, connW: 12 }; 
    if (w <= 768) return { sz: 48, fs: 11, pad: 5, cardW: 58, connW: 14 }; 
    return { sz: 52, fs: 12, pad: 6, cardW: 64, connW: 16 };               
  }
  window.addEventListener('resize', function() {
    if(state.dbReady && document.getElementById('tree-view').style.display !== 'none') renderTree(); 
  });

  /* ── HELPERS ── */
  function s(key){ return STRINGS[state.lang][key] || STRINGS.en[key]; }
  function initials(n){ return n ? n.split(' ').map(function(w){return w[0]||''}).join('').slice(0,2).toUpperCase() : '??'; }
  function dname(m){ return state.lang==='hi' && m.nameHi ? m.nameHi : m.name; }
  
  function getPrimaries(pid){ 
    return state.members.filter(function(m){
      if(!m) return false;
      return (m.parentId || null) === (pid || null) && !m.isSpouse;
    }); 
  }
  function getSpouse(m){ return m.spouse ? state.members.find(function(x){return x && x.id===m.spouse;})||null : null; }
  function getChildren(m){ return state.members.filter(function(x){return x && x.parentId===m.id && !x.isSpouse;}); }

  function showToast(msg){
    var t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},2200);
  }
  function showSync(msg, col){
    if(state.isViewOnly) return; 
    var p=document.getElementById('sync-pill');
    p.textContent=msg; p.style.color=col||'var(--gold)'; p.style.opacity='1';
    clearTimeout(p._t); p._t=setTimeout(function(){p.style.opacity='0';},2500);
  }

  /* ── FIREBASE DATA SYNC ── */
  function saveToFirebase(){
    if(!state.dbReady || state.isViewOnly) return;
    try {
      var cleanPayload = JSON.parse(JSON.stringify({members:state.members, familyName:state.familyName, expanded:state.expanded, v:1}));
      dataRef.set(cleanPayload).then(function(){showSync('✓ synced');}).catch(function(err){ showSync('⚠ sync failed','#f09595');});
    } catch(e) { showSync('⚠ data error','#f09595'); }
  }

  function startSync(){
    showSync('connecting…','var(--text3)');
    
    dataRef.on('value', function(snap){
      var data = snap.val();
      state.dbReady = true;
      if(data){
        var rawMembers = data.members || [];
        if (!Array.isArray(rawMembers) && typeof rawMembers === 'object') {
          rawMembers = Object.keys(rawMembers).map(function(k){ return rawMembers[k]; });
        }
        state.members = rawMembers.filter(Boolean).map(function(m) {
          if (m.parentId === undefined || m.parentId === '') m.parentId = null;
          return m;
        });
        if(data.familyName) state.familyName = data.familyName;
        
        state.expanded = {};
        if(data.expanded){
          var saved = data.expanded;
          var memberIds = {};
          state.members.forEach(function(m){ memberIds[m.id]=true; });
          Object.keys(saved).forEach(function(k){ if(saved[k] && memberIds[k]) state.expanded[k]=true; });
        }
      } else {
        state.members = [];
        state.expanded = {};
      }
      var bn = document.getElementById('brand-name');
      if(bn) bn.textContent = state.familyName;

      var tv = document.getElementById('tree-view');
      var av = document.getElementById('admin-view');
      if(av && av.style.display !== 'none' && isAdmin()) renderAdmin();
      else if(tv && tv.style.display !== 'none') renderTree();
      
      showSync('✓ connected');
    });

    if (!state.isViewOnly) {
      usersRef.on('value', function(snap){
        state.users = snap.val() || {};
        if (state.currentUser && state.currentUser.username !== MASTER_USER) {
             var dbUserKey = Object.keys(state.users).find(k => state.users[k].username === state.currentUser.username);
             var dbUser = dbUserKey ? state.users[dbUserKey] : null;

             if (!dbUser) { doLogout(); return; }

             var needsUpdate = false;
             if (state.currentUser.status !== dbUser.status) { state.currentUser.status = dbUser.status; needsUpdate = true; }
             if (state.currentUser.role !== dbUser.role) { state.currentUser.role = dbUser.role; needsUpdate = true; }

             if (needsUpdate) {
                localStorage.setItem('famUser', JSON.stringify(state.currentUser));
                if (state.currentUser.status === 'approved') { unlockApp(); } 
                else {
                   document.getElementById('main-nav').style.display = 'none';
                   document.getElementById('tree-view').style.display = 'none';
                   document.getElementById('admin-view').style.display = 'none';
                   document.getElementById('auth-view').style.display = 'none';
                   document.getElementById('waiting-overlay').style.display = 'flex';
                }
             }
        }
        var authV = document.getElementById('auth-view');
        if(authV && authV.style.display !== 'none' && isAdmin()) renderAuthPanel();
      });
    }
  }

  /* ── AUTHENTICATION ENGINE ── */
  function checkLocalAuth() {
    const urlParams = new URLSearchParams(window.location.search);
    const shareToken = urlParams.get('share');
    
    if (shareToken) {
       document.getElementById('auth-title').textContent = "Checking secure link...";
       document.getElementById('auth-user').style.display = 'none';
       document.getElementById('auth-pass').style.display = 'none';
       document.getElementById('btn-login-submit').style.display = 'none';
       document.getElementById('btn-login-toggle').style.display = 'none';

       linksRef.child(shareToken).once('value').then(function(snap) {
           var linkData = snap.val();
           if (linkData && linkData.expiresAt > Date.now()) {
               state.isViewOnly = true;
               unlockApp();
           } else {
               document.getElementById('auth-error').textContent = "This shared link has expired or is invalid.";
               document.getElementById('btn-login-toggle').style.display = 'block';
               document.getElementById('btn-login-toggle').textContent = "Return to Login";
               document.getElementById('btn-login-toggle').onclick = function() { window.location.href = window.location.pathname; };
           }
       });
       return;
    }

    var saved = localStorage.getItem('famUser');
    if (saved) {
      state.currentUser = JSON.parse(saved);
      if (state.currentUser.status === 'approved') unlockApp();
      else {
         document.getElementById('login-overlay').style.display = 'none';
         document.getElementById('waiting-overlay').style.display = 'flex';
         startSync(); 
      }
    }
  }

  function toggleAuthMode() {
    var err = document.getElementById('auth-error');
    var title = document.getElementById('auth-title');
    var btnSubmit = document.getElementById('btn-login-submit');
    var btnToggle = document.getElementById('btn-login-toggle');
    
    err.textContent = '';
    if (state.authMode === 'login') {
      state.authMode = 'register';
      title.textContent = 'create account';
      btnSubmit.textContent = 'Register';
      btnToggle.textContent = 'I already have an account';
    } else {
      state.authMode = 'login';
      title.textContent = 'secure access';
      btnSubmit.textContent = 'Log In';
      btnToggle.textContent = 'Create an Account instead';
    }
  }

  function doAuth() {
    var un = document.getElementById('auth-user').value.trim();
    var pw = document.getElementById('auth-pass').value.trim();
    var err = document.getElementById('auth-error');
    err.textContent = '';

    if (!un || !pw) { err.textContent = 'Please enter both fields.'; return; }

    if (un === MASTER_USER && pw === MASTER_PASS) {
       state.currentUser = { username: un, role: 'admin', status: 'approved' };
       localStorage.setItem('famUser', JSON.stringify(state.currentUser));
       unlockApp();
       return;
    }

    usersRef.once('value').then(function(snap) {
       var users = snap.val() || {};
       var userKey = Object.keys(users).find(k => users[k].username.toLowerCase() === un.toLowerCase());
       var dbUser = userKey ? users[userKey] : null;

       if (state.authMode === 'login') {
          if (!dbUser) { err.textContent = 'Username not found.'; return; }
          if (dbUser.password !== pw) { err.textContent = 'Incorrect password.'; return; }
          
          state.currentUser = { username: dbUser.username, role: dbUser.role, status: dbUser.status };
          localStorage.setItem('famUser', JSON.stringify(state.currentUser));
          
          if (dbUser.status === 'approved') unlockApp();
          else {
             document.getElementById('login-overlay').style.display = 'none';
             document.getElementById('waiting-overlay').style.display = 'flex';
             startSync();
          }
       } else {
          if (dbUser) { err.textContent = 'Username is already taken.'; return; }
          if (un.toLowerCase() === MASTER_USER.toLowerCase()) { err.textContent = 'Reserved username.'; return; }

          var newUser = { username: un, password: pw, role: 'member', status: 'pending' };
          usersRef.push(newUser).then(() => {
             state.currentUser = { username: un, role: 'member', status: 'pending' };
             localStorage.setItem('famUser', JSON.stringify(state.currentUser));
             document.getElementById('login-overlay').style.display = 'none';
             document.getElementById('waiting-overlay').style.display = 'flex';
             startSync();
          });
       }
    });
  }

  function unlockApp() {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('waiting-overlay').style.display = 'none';
    
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('tab-admin').style.display = 'none';
    document.getElementById('tab-auth').style.display = 'none';

    if (isAdmin()) {
       document.getElementById('tab-admin').style.display = 'block';
       document.getElementById('tab-auth').style.display = 'block';
    }

    applyLang();
    
    var tv = document.getElementById('tree-view');
    var av = document.getElementById('admin-view');
    var au = document.getElementById('auth-view');
    
    if (tv.style.display === 'none' && av.style.display === 'none' && au.style.display === 'none') {
        tv.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:1rem"><div style="width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite"></div><span style="font-size:13px;color:var(--text3);letter-spacing:.06em">loading family data…</span></div>';
        tv.style.display = 'block';
    }

    if (!state.dbReady) {
        startSync();
    } else {
        var activeTab = document.querySelector('.nav-tab.active');
        if(activeTab && !state.isViewOnly) showView(activeTab.id.replace('tab-', ''), activeTab);
        else renderTree();
    }
  }

  function doLogout(){ 
    localStorage.removeItem('famUser');
    window.location.href = window.location.pathname; 
  }

  /* ── HIGH RES EXPORT ENGINE ── */
  function exportTree() {
      showToast("Generating Poster... Please wait.");
      var root = document.getElementById('tree-root');
      var originalBg = root.style.background;
      var originalPadding = root.style.padding;
      
      var compStyle = getComputedStyle(document.body);
      root.style.background = compStyle.getPropertyValue('--bg').trim();
      root.style.padding = "40px"; 
      
      html2canvas(root, {
          scale: 2, 
          backgroundColor: root.style.background,
          logging: false
      }).then(function(canvas) {
          var link = document.createElement('a');
          link.download = state.familyName + '_Family_Tree.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
          
          root.style.background = originalBg; 
          root.style.padding = originalPadding;
          showToast("Poster Exported!");
      }).catch(function(err) {
          console.error(err);
          root.style.background = originalBg;
          root.style.padding = originalPadding;
          showToast("Export failed.");
      });
  }

  /* ── SMART SEARCH & FILTER LOGIC ── */
  function handleSearch(val) {
      state.searchQuery = val.toLowerCase();
      applySearchAndFilter();
  }
  function handleFilter(val) {
      state.filterMode = val;
      if (val === 'lineage' && !state.selected) {
         showToast("Click a family member to trace their lineage!");
      }
      applySearchAndFilter();
  }
  
  function applySearchAndFilter() {
      var firstMatch = null;
      var cards = document.querySelectorAll('.person-card');
      
      var lineageIds = new Set();
      if (state.filterMode === 'lineage' && state.selected) {
          var curr = state.members.find(m => m.id === state.selected);
          if (curr && curr.isSpouse) {
              curr = state.members.find(m => m.id === curr.spouse);
          }
          if (curr) {
              lineageIds.add(curr.id);
              if (curr.spouse) lineageIds.add(curr.spouse);

              var ptr = state.members.find(m => m.id === curr.parentId);
              while (ptr) {
                  lineageIds.add(ptr.id);
                  if (ptr.spouse) lineageIds.add(ptr.spouse);
                  ptr = state.members.find(m => m.id === ptr.parentId);
              }

              var stack = [curr.id];
              while (stack.length > 0) {
                  var curId = stack.pop();
                  lineageIds.add(curId);
                  var person = state.members.find(m => m.id === curId);
                  if (person && person.spouse) lineageIds.add(person.spouse);

                  var kids = state.members.filter(m => m.parentId === curId && !m.isSpouse);
                  kids.forEach(k => stack.push(k.id));
              }
          }
      }

      cards.forEach(function(card) {
          var name = card.getAttribute('data-name').toLowerCase();
          var isDead = card.getAttribute('data-dead') === 'true';
          var memberId = card.getAttribute('data-id');
          
          var matchesSearch = state.searchQuery === '' || name.includes(state.searchQuery);
          var matchesFilter = true;

          if (state.filterMode === 'living') matchesFilter = !isDead;
          else if (state.filterMode === 'deceased') matchesFilter = isDead;
          else if (state.filterMode === 'lineage') {
              if (state.selected) matchesFilter = lineageIds.has(memberId);
          }

          if (matchesSearch && matchesFilter) {
              card.style.opacity = '1';
              card.style.transform = 'scale(1)';
              if (state.searchQuery !== '') {
                  card.style.boxShadow = '0 0 20px var(--gold)';
                  card.style.borderColor = 'var(--gold)';
                  if(!firstMatch) firstMatch = card;
              } else {
                  card.style.boxShadow = 'none';
                  card.style.borderColor = 'transparent';
              }
          } else {
              card.style.opacity = '0.15';
              card.style.transform = 'scale(0.95)';
              card.style.boxShadow = 'none';
              card.style.borderColor = 'transparent';
          }
      });

      if (firstMatch && state.searchQuery !== '') {
          firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
      }
  }


  /* ── LANGUAGE ── */
  function setLang(l){
    state.lang=l;
    document.querySelectorAll('.lang-btn').forEach(function(b,i){
      if(i < 2) b.classList.toggle('active', (i===0&&l==='en')||(i===1&&l==='hi'));
    });
    applyLang();
    var tv=document.getElementById('tree-view');
    var av=document.getElementById('admin-view');
    var au=document.getElementById('auth-view');
    if(tv&&tv.style.display!=='none') renderTree();
    if(av&&av.style.display!=='none' && isAdmin()) renderAdmin();
    if(au&&au.style.display!=='none' && isAdmin()) renderAuthPanel();
  }
  function applyLang(){
    document.getElementById('tab-tree').textContent=s('navTree');
    document.getElementById('tab-admin').textContent=s('navAdmin');
    document.getElementById('tab-auth').textContent= 'Auth Panel';
    document.body.classList.toggle('lang-hi', state.lang==='hi');

  /* ── RESPONSIVE TREE RENDER ── */
  function makeAvatar(m, sz){
    var av=document.createElement('div');
    av.className='avatar';
    av.style.cssText='width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*.27)+'px';
    if(m.photo){
      var img=document.createElement('img');
      img.src=m.photo; img.alt=m.name;
      img.onerror=function(){av.textContent=initials(m.name);};
      av.appendChild(img);
    } else { av.textContent=initials(m.name); }
    return av;
  }

  function buildCard(m, sz, fs, pad, cardW, hasKids, isExp, isSpouse){
    var card=document.createElement('div');
    
    if(state.isViewOnly) {
       card.className='person-card view-only'+(isSpouse?' spouse-card':'');
       card.style.cursor = 'default';
    } else {
       card.className='person-card'+(isSpouse?' spouse-card':'')+(m.id===state.selected?' selected':'');
    }

    card.setAttribute('data-id', m.id);
    card.setAttribute('data-name', dname(m) + " " + (m.nameHi || ""));
    card.setAttribute('data-dead', m.deathYear ? 'true' : 'false');

    card.style.cssText='padding:'+pad+'px; width:'+cardW+'px; min-width:'+cardW+'px; flex-shrink:0; display:flex; flex-direction:column; align-items:center;';
    card.appendChild(makeAvatar(m,sz));
    
    var nm=document.createElement('div');
    nm.className='person-name'+(isSpouse?'':' primary');
    nm.style.cssText='font-size:'+fs+'px; margin-top:6px; width:100%; display:flex; justify-content:center; overflow:visible;';
    
    var span = document.createElement('span');
    span.style.cssText = 'display:block; margin: 0 -30px; text-align:center; line-height:1.1;';
    // THE FIX: Automatically converts spaces into line breaks to stack the words!
    span.innerHTML = dname(m).replace(/ /g, '<br>');
    nm.appendChild(span);
    card.appendChild(nm);
    
    if(isSpouse){
      var sl=document.createElement('div');
      sl.className='spouse-label';
      sl.style.cssText = 'width:100%; display:flex; justify-content:center; overflow:visible; margin-top:2px;';
      var slSpan = document.createElement('span');
      slSpan.style.cssText = 'display:block; margin: 0 -30px; text-align:center;';
      slSpan.textContent = s('spouse');
      sl.appendChild(slSpan);
      card.appendChild(sl);
    }

    if(m.birthYear || m.deathYear) {
      var dt = document.createElement('div');
      dt.className = 'date-label';
      var by = m.birthYear ? m.birthYear.trim() : '';
      var dy = m.deathYear ? m.deathYear.trim() : '';
      var dateString = '';
      if(by && dy) dateString = by + ' - ' + dy;
      else if(by && !dy) dateString = by + ' - Present';
      else if(!by && dy) dateString = 'Died: ' + dy;
      dt.textContent = dateString;
      card.appendChild(dt);
    }
    
    if(hasKids && !isSpouse && !state.isViewOnly){
      var dot=document.createElement('div');
      dot.className='expand-dot';
      dot.style.background=isExp?'var(--gold2)':'var(--gold)';
      dot.style.marginTop='4px';
      card.appendChild(dot);
    }

    if(!isSpouse){
      card.onclick=function(){
        // Allow clicks even in view-only for the Lineage Tracing tool
        if(hasKids && !state.isViewOnly){
          if(state.expanded[m.id]) delete state.expanded[m.id];
          else state.expanded[m.id]=true;
        }
        state.selected=m.id;
        renderTree();
      };
    }
    return card;
  }

  function renderLevel(parent, parentId, gen){
    var prim=getPrimaries(parentId);
    if(!prim.length) return;
    
    var sizes = getSizes();
    var sz = sizes.sz, fs = sizes.fs, pad = sizes.pad, cardW = sizes.cardW, connW = sizes.connW;
    var topStart = Math.round(sz / 2 + pad);
    
    var row=document.createElement('div');
    row.className = 'tree-row'; 

    prim.forEach(function(m){
      var col=document.createElement('div');
      col.className = 'tree-col'; 
      
      // AUTO EXPAND FOR LINEAGE TRACING AND GUESTS
      var sp=getSpouse(m), kids=getChildren(m), exp = (state.isViewOnly || state.filterMode === 'lineage') ? true : !!state.expanded[m.id];
      
      var primaryWrap = document.createElement('div');
      primaryWrap.style.cssText = 'display: flex; align-items: flex-start; position: relative; z-index: 2;';
      
      primaryWrap.appendChild(buildCard(m, sz, fs, pad, cardW, kids.length>0, exp, false));
      
      if(sp){
        var conn = document.createElement('div');
        conn.style.cssText = 'display:flex; align-items:center; padding-top:'+(topStart - 1)+'px; width:'+connW+'px; justify-content: center; flex-shrink: 0;';
        conn.innerHTML = '<svg width="'+connW+'" height="2"><line x1="0" y1="1" x2="'+connW+'" y2="1" stroke="var(--gold)" stroke-width="2"/></svg>';
        
        primaryWrap.appendChild(conn);
        primaryWrap.appendChild(buildCard(sp, sz, fs, pad, cardW, false, false, true));
        
        var shiftX = (cardW + connW) / 2;
        col.style.setProperty('--shift-x', shiftX + 'px');
      } else {
        col.style.setProperty('--shift-x', '0px');
      }
      
      col.appendChild(primaryWrap);
      
      if(kids.length && exp){
          var dropLine = document.createElement('div');
          dropLine.style.cssText = 'position: absolute; bottom: -30px; width: 2px; background: var(--gold); z-index: -1;';
          
          dropLine.style.top = sp ? topStart + 'px' : '100%';
          dropLine.style.left = '50%';
          dropLine.style.transform = 'translateX(-50%)';
          
          var cr = document.createElement('div');
          cr.style.position = 'relative';
          
          primaryWrap.appendChild(dropLine);
          renderLevel(cr, m.id, gen+1);
          col.appendChild(cr);
      }
      
      row.appendChild(col);
    });
    parent.appendChild(row);
  }

  function modifyUser(key, action) {
    if(!isAdmin()) return; 
    var uRef = usersRef.child(key);
    if (action === 'approve') uRef.update({ status: 'approved' });
    else if (action === 'admin') uRef.update({ role: 'admin' });
    else if (action === 'demote') uRef.update({ role: 'member' });
    else if (action === 'revoke') uRef.remove(); 
    showToast('User updated');
  }

  /* ── SHARE LINK LOGIC ── */
  function generateShareLink() {
     if(!isAdmin()) return;
     var hours = parseInt(document.getElementById('share-expiry').value) || 1;
     var token = 'share_' + Math.random().toString(36).substr(2, 9);
     var expiresAt = Date.now() + (hours * 60 * 60 * 1000); 

     linksRef.child(token).set({
         expiresAt: expiresAt,
         createdBy: state.currentUser.username
     }).then(function() {
         var url = window.location.origin + window.location.pathname + '?share=' + token;
         navigator.clipboard.writeText(url).then(function() {
             showToast("Link copied! Valid for " + hours + " hr(s).");
         }).catch(function() {
             prompt("Copy this link:", url);
         });
     });
  }

  function handleFile(inp){
    var f=inp.files[0]; if(!f) return;
    var btn = document.querySelector('.btn-save');
    if(btn) { btn.disabled = true; btn.textContent = 'Processing Image...'; }
    var r=new FileReader();
    r.onload=function(e){
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas'); var MAX = 180; var w = img.width, h = img.height;
        if(w === 0 || h === 0) { if(btn) { btn.disabled = false; btn.textContent = 'Save'; } return; }
        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } else { if (h > MAX) { w *= MAX / h; h = MAX; } }
        canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        state.prevPhoto = canvas.toDataURL('image/jpeg', 0.85);
        var pp=document.getElementById('pp'); if(pp) pp.innerHTML='<img src="'+state.prevPhoto+'">';
        var pu=document.getElementById('p-url'); if(pu) pu.value=''; 
        if(btn) { btn.disabled = false; btn.textContent = 'Save'; }
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(f);
  }

    if(!fn && !fnHi){ showToast('Please enter a name'); return; }

    var dYear = (document.getElementById('f-dy')||{}).value||''; dYear = dYear.trim();

    var parentId=(document.getElementById('f-par')||{}).value||null;
    var gen=parseInt((document.getElementById('f-gen')||{}).value||'0') || 0;
    var spN=((document.getElementById('f-sp')||{}).value||'').trim();
    var spNHi=((document.getElementById('f-sp-hi')||{}).value||'').trim();

    async function quickTranslate(text, langContext) {
      if(!GEMINI_API_KEY || GEMINI_API_KEY === 'YOUR_API_KEY_HERE') return ''; 
      try {
        var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + GEMINI_API_KEY;
        var resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: 'Transliterate the following name into ' + langContext + '. Return ONLY the translated name. Name: ' + text }] }] }) });
        var data = await resp.json();
        if(data.error) return '';
        if(data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts[0]) return data.candidates[0].content.parts[0].text.trim();
        return '';
      } catch(e) { return ''; }
    }

    var btn = document.querySelector('.btn-save'); var originalBtnText = btn ? btn.textContent : 'Save';
    if(btn) btn.disabled = true;

    if (name && !nameHi) { if(btn) btn.textContent = 'Translating...'; nameHi = await quickTranslate(name, 'Hindi (Devanagari script)'); } 
    else if (nameHi && !name) { if(btn) btn.textContent = 'Translating...'; name = await quickTranslate(nameHi, 'English (Romanized letters)'); }

    if (spN && !spNHi) { if(btn) btn.textContent = 'Translating...'; spNHi = await quickTranslate(spN, 'Hindi (Devanagari script)'); } 
    else if (spNHi && !spN) { if(btn) btn.textContent = 'Translating...'; spN = await quickTranslate(spNHi, 'English (Romanized letters)'); }
    
    if(btn){ btn.textContent = originalBtnText; btn.disabled = false; }
    if(!name) name = nameHi; if(!nameHi) nameHi = name;

    if(state.editingId==='__new__'){
      var id='m'+Date.now();
      var nm={id:id,name:name,nameHi:nameHi,photo:state.prevPhoto,parentId:parentId,generation:gen,spouse:'',isSpouse:false, birthYear:bYear, deathYear:dYear};
      state.members.push(nm);
      if(spN || spNHi){ var sid=id+'s'; nm.spouse=sid; state.members.push({id:sid,name:spN,nameHi:spNHi,photo:state.prevPhotoSpouse,parentId:null,generation:gen,spouse:id,isSpouse:true}); }
      state.editingId=id;
    } else {
      var m=state.members.find(function(x){return x && x.id===state.editingId;});
      if(m){ m.name=name; m.nameHi=nameHi; m.photo=state.prevPhoto; m.parentId=parentId; m.generation=gen; m.birthYear=bYear; m.deathYear=dYear;
        if(spN || spNHi){
          if(m.spouse){ var sp=state.members.find(function(x){return x && x.id===m.spouse;}); if(sp){sp.name=spN; sp.nameHi=spNHi; sp.photo=state.prevPhotoSpouse;} }
          else{ var sid2=m.id+'s'; m.spouse=sid2; state.members.push({id:sid2,name:spN,nameHi:spNHi,photo:state.prevPhotoSpouse,parentId:null,generation:gen,spouse:m.id,isSpouse:true}); }
        } else if(m.spouse){ state.members=state.members.filter(function(x){return x && x.id!==m.spouse;}); m.spouse=''; }
      }
    }
    
    saveToFirebase(); showToast(s('saved')); renderAdmin(); renderTree();
  }

  function delMember(id){
    if(!isAdmin()) { showToast("Unauthorized"); return; } 
    
    var m=state.members.find(function(x){return x && x.id===id;});
    if(m && m.spouse) {
       state.members = state.members.filter(function(x){ return x && x.id !== m.spouse; });
       delete state.expanded[m.spouse];
    }
    
    state.members.filter(function(x){return x && x.parentId===id;}).forEach(function(c){c.parentId=null;});
    state.members=state.members.filter(function(x){return x && x.id!==id;});
    delete state.expanded[id]; 
    state.editingId=null;
    
    saveToFirebase(); showToast(s('deleted')); renderAdmin(); renderTree();
  }

  function showView(v, btn){
    if ((v === 'admin' || v === 'auth') && !isAdmin()) {
        showToast("Unauthorized access blocked.");
        return;
    }

    document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
    btn.classList.add('active');
    document.getElementById('tree-view').style.display='none';
    document.getElementById('admin-view').style.display='none';
    document.getElementById('auth-view').style.display='none';
    
    document.getElementById(v+'-view').style.display = (v === 'tree') ? 'block' : 'grid';
    
    if(v==='tree') renderTree();
    else if(v==='admin') renderAdmin();
    else if(v==='auth') renderAuthPanel();
  }

  window.App = {
    doAuth: doAuth,
    toggleAuthMode: toggleAuthMode,
    setLang: setLang,
    showView: showView,
    startNew: startNew,
    cancelEdit: cancelEdit,
    updateFamilyName: updateFamilyName,
    applyUrl: applyUrl,
    handleFile: handleFile,
    applyUrlSp: applyUrlSp,
    handleFileSp: handleFileSp,
    saveMember: saveMember,
    delMember: delMember,
    doLogout: doLogout,
    modifyUser: modifyUser,
    generateShareLink: generateShareLink,
    exportTree: exportTree, 
    handleSearch: handleSearch, 
    handleFilter: handleFilter, 
    setTheme: setTheme 
  };

  // Check on load
  checkLocalAuth();

})();
</script>
</body>
</html>
