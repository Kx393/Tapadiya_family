<body>
<div class="bg-canvas"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="custom-bg" id="custom-bg"></div>

<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo"><em>family</em> <span>tree</span></div>
    <p class="login-sub" id="auth-title">secure access</p>
    <div class="auth-error" id="auth-error"></div>
    <input type="text" class="auth-input" id="auth-user" placeholder="Username" autocomplete="off" onkeypress="if(event.key === 'Enter') App.doAuth()">
    <input type="password" class="auth-input" id="auth-pass" placeholder="Password" onkeypress="if(event.key === 'Enter') App.doAuth()">
    <button class="auth-btn" id="btn-login-submit" onclick="App.doAuth()">Log In</button>
    <button class="auth-btn-sec" id="btn-login-toggle" onclick="App.toggleAuthMode()">Create an Account instead</button>
  </div>
</div>

<div id="waiting-overlay" style="display:none;">
  <div class="login-box">
    <div class="login-logo"><em>family</em> <span>tree</span></div>
    <div style="width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite; margin: 20px auto;"></div>
    <h3 style="font-family:'Outfit'; font-weight:400; color:var(--gold); margin-bottom: 10px;">Account Pending</h3>
    <p style="font-size:13px; color:var(--text3); line-height: 1.4; margin-bottom: 20px;">Your account has been created successfully. You are currently waiting for an Admin to approve your access.</p>
    <button class="auth-btn-sec" onclick="App.doLogout()">Log Out</button>
  </div>
</div>

<div id="profile-modal" class="modal-overlay" onclick="if(event.target===this) App.closeProfile()">
  <div class="modal-content">
    <button class="modal-close" onclick="App.closeProfile()">×</button>
    <div class="modal-av" id="pm-av"></div>
    <div class="modal-name" id="pm-name"></div>
    <div class="modal-dates" id="pm-dates"></div>
    <div class="modal-details" id="pm-details"></div>
  </div>
</div>

<nav class="nav" id="main-nav" style="display:none">
  <span class="nav-brand"><em>family</em> <span id="brand-name">tree</span></span>
  <button class="nav-tab active" id="tab-tree" onclick="App.showView('tree',this)">family tree</button>
  <button class="nav-tab" id="tab-admin" onclick="App.showView('admin',this)" style="display:none;">admin panel</button>
  <button class="nav-tab" id="tab-auth" onclick="App.showView('auth',this)" style="display:none;">auth panel</button>
  <div class="lang-toggle">
    <select id="theme-picker" class="tool-select" style="margin-right:10px; border-radius:20px; background:transparent; border-color:transparent; color:var(--text3);" onchange="App.setTheme(this.value)">
      <option value="dark">🌙 Dark</option><option value="light">☀️ Light</option><option value="vintage">📜 Vintage</option>
    </select>
    <button class="lang-btn active" onclick="App.setLang('en')">EN</button>
    <button class="lang-btn" onclick="App.setLang('hi')" style="border-right:1px solid var(--border); border-radius:0;">हि</button>
    <button class="lang-btn" onclick="App.doLogout()" style="color: #f09595; padding-left: 1rem;">🚪 Exit</button>
  </div>
</nav>

<div id="tree-view" style="display:none"></div><div id="admin-view" style="display:none"></div><div id="auth-view" style="display:none"></div>
<div class="toast" id="toast"></div><div class="sync-pill" id="sync-pill"></div>

<script>
(function() {
  const fbConfig = { apiKey: "AIzaSyDviN1RaF9dpUd5ZqFxNNVIDWVYzX9KxPE", authDomain: "family-493f7.firebaseapp.com", databaseURL: "https://family-493f7-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "family-493f7", storageBucket: "family-493f7.firebasestorage.app", messagingSenderId: "677547416268", appId: "1:677547416268:web:b78af5a19bce0106344069" };
  firebase.initializeApp(fbConfig); const db = firebase.database(), dataRef = db.ref('familyTree'), usersRef = db.ref('familyTreeUsers'), linksRef = db.ref('sharedLinks');
  const MASTER_USER = 'Kx393', MASTER_PASS = 'sumedh_is_the_goat';

  const sText = {
    en:{ fam:'The <em>$1</em> Family', hint:'click a name to view details', sp:'spouse', add:'+ add new member', all:'all members', root:'root', desc:'descendant', edit:'edit member', new:'new member', par:'parent', gen:'generation level', spN:'spouse name', sv:'save', del:'delete', can:'cancel', sel:'select a member or add new', sved:'saved', dlted:'deleted', fn:'family name', up:'update', pUrl:'paste image URL…', app:'apply', upl:'upload file', bl:'leave blank if none' },
    hi:{ fam:'<em>$1</em> परिवार', hint:'विवरण देखने के लिए नाम पर क्लिक करें', sp:'पति/पत्नी', add:'+ सदस्य जोड़ें', all:'सभी सदस्य', root:'मूल', desc:'वंशज', edit:'संपादित करें', new:'नया सदस्य', par:'अभिभावक', gen:'पीढ़ी स्तर', spN:'पति/पत्नी का नाम', sv:'सहेजें', del:'हटाएं', can:'रद्द करें', sel:'सदस्य चुनें या नया जोड़ें', sved:'सहेजा गया', dlted:'हटाया गया', fn:'परिवार का नाम', up:'अपडेट', pUrl:'URL पेस्ट करें…', app:'लागू करें', upl:'अपलोड करें', bl:'खाली छोड़ें' }
  };
  function s(k, v){ let t = sText[state.lang][k] || sText['en'][k]; return v ? t.replace('$1', v) : t; }

  var state = { lang: 'en', theme: 'dark', familyName: 'Shah', bgLayers: [], dbReady: false, members: [], expanded: {}, users: {}, currentUser: null, authMode: 'login', selected: null, editingId: null, prevPhoto: '', prevPhotoSpouse: '', prevGallery: [], isViewOnly: false, searchQuery: '', filterMode: 'all' };
  
  function isAdmin() { return state.currentUser && state.currentUser.role === 'admin' && !state.isViewOnly; }
  
  function setTheme(t) { state.theme = t; document.body.className = ''; if(t!=='dark') document.body.classList.add('theme-'+t); localStorage.setItem('famTheme', t); }
  var savedTheme = localStorage.getItem('famTheme'); if(savedTheme) { document.getElementById('theme-picker').value = savedTheme; setTheme(savedTheme); }

  /* BACKGROUND ENGINE */
  function applyBgSettings() {
      var customBg = document.getElementById('custom-bg'); customBg.innerHTML = '';
      if (state.bgLayers && state.bgLayers.length > 0) {
          state.bgLayers.forEach(l => {
              var d = document.createElement('div'); d.className = 'custom-bg-layer';
              d.style.backgroundImage = `url(${l.url})`; d.style.backgroundSize = `${l.zoom||100}%`; d.style.backgroundPosition = `${l.x||50}% ${l.y||50}%`;
              customBg.appendChild(d);
          });
          document.querySelectorAll('.orb').forEach(o => o.style.display = 'none');
      } else { document.querySelectorAll('.orb').forEach(o => o.style.display = 'block'); }
  }
  function handleDropZoneOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
  function handleDropZoneLeave(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); }
  function handleDropZoneDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); var f = e.dataTransfer.files[0]; if(f) processBgFile(f); }
  function handleBgFile(inp) { var f = inp.files[0]; if(f) processBgFile(f); }
  function processBgFile(file) {
      var btn = document.getElementById('btn-save-bg'); if (btn) { btn.disabled = true; btn.textContent = 'Processing...'; }
      var r = new FileReader(); r.onload = e => {
          var img = new Image(); img.onload = () => {
              var c = document.createElement('canvas'); var M = 1600; var w = img.width, h = img.height;
              if (w > h) { if (w > M) { h *= M / w; w = M; } } else { if (h > M) { w *= M / h; h = M; } }
              c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h);
              if (!state.bgLayers) state.bgLayers = [];
              state.bgLayers.push({ id: 'bg'+Date.now(), url: c.toDataURL('image/jpeg', 0.8), zoom: 100, x: 50, y: 50 });
              applyBgSettings(); renderAdmin(); 
          }; img.src = e.target.result;
      }; r.readAsDataURL(file);
  }
  function updateLayer(id, p, v) { var l = state.bgLayers.find(x => x.id === id); if(l) { l[p] = v; applyBgSettings(); } }
  function removeLayer(id) { state.bgLayers = state.bgLayers.filter(x => x.id !== id); applyBgSettings(); renderAdmin(); }
  function saveBgSettings() { if(isAdmin()) { saveToFirebase(); showToast('Backgrounds saved!'); } }

  /* MULTI-GALLERY */
  function handleGalleryFiles(inp) {
      var files = inp.files; if (!files || !files.length) return;
      var btn = document.querySelector('.btn-save'); if(btn) { btn.disabled = true; btn.textContent = 'Processing...'; }
      var p = 0;
      for (let i = 0; i < files.length; i++) {
          let r = new FileReader(); r.onload = e => {
              let img = new Image(); img.onload = () => {
                  let c = document.createElement('canvas'); let M = 800; let w = img.width, h = img.height;
                  if(w>h){if(w>M){h*=M/w;w=M}}else{if(h>M){w*=M/h;h=M}}
                  c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h);
                  state.prevGallery.push(c.toDataURL('image/jpeg', 0.7)); p++;
                  if(p === files.length) { if(btn) { btn.disabled = false; btn.textContent = s('sv'); } renderGalleryPreviews(); }
              }; img.src = e.target.result;
          }; r.readAsDataURL(files[i]);
      }
  }
  function renderGalleryPreviews() {
      var c = document.getElementById('gallery-previews'); if(!c) return;
      c.innerHTML = state.prevGallery.map((src, i) => `<div style="position:relative;width:60px;height:60px;border-radius:8px;overflow:hidden;border:1px solid var(--border2);flex-shrink:0;"><img src="${src}" style="width:100%;height:100%;object-fit:cover;"><div onclick="App.removeGalleryImg(${i})" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);color:#fff;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;">×</div></div>`).join('');
  }
  function removeGalleryImg(i) { state.prevGallery.splice(i, 1); renderGalleryPreviews(); }

  /* CORE UTILS */
  function getSizes() { var w = window.innerWidth; if(w<=480) return {sz:44,fs:10,pad:4,cardW:52,connW:12}; if(w<=768) return {sz:48,fs:11,pad:5,cardW:58,connW:14}; return {sz:52,fs:12,pad:6,cardW:64,connW:16}; }
  window.addEventListener('resize', () => { if(state.dbReady && document.getElementById('tree-view').style.display !== 'none') renderTree(); });
  function initials(n){ return n ? n.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase() : '??'; }
  function dname(m){ return state.lang==='hi'&&m.nameHi ? m.nameHi : m.name; }
  function getPrimaries(pid){ return state.members.filter(m => m && (m.parentId||null) === (pid||null) && !m.isSpouse); }
  function getSpouse(m){ return m.spouse ? state.members.find(x => x && x.id === m.spouse) || null : null; }
  function getChildren(m){ return state.members.filter(x => x && x.parentId === m.id && !x.isSpouse); }
  function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
  function showSync(msg, col){ if(state.isViewOnly) return; var p=document.getElementById('sync-pill'); p.textContent=msg; p.style.color=col||'var(--gold)'; p.style.opacity='1'; clearTimeout(p._t); p._t=setTimeout(()=>p.style.opacity='0',2500); }

  /* SYNC */
  function saveToFirebase(){
    if(!state.dbReady || state.isViewOnly) return;
    try { dataRef.set(JSON.parse(JSON.stringify({members:state.members, familyName:state.familyName, bgLayers:state.bgLayers, v:1}))).then(()=>showSync('✓ synced')).catch(()=>showSync('⚠ sync failed','#f09595')); } catch(e){ showSync('⚠ data error','#f09595'); }
  }
  function startSync(){
    showSync('connecting…','var(--text3)');
    dataRef.on('value', snap => {
      var d = snap.val(); state.dbReady = true;
      if(d){
        let rm = d.members || []; if(!Array.isArray(rm) && typeof rm === 'object') rm = Object.keys(rm).map(k => rm[k]);
        state.members = rm.filter(Boolean).map(m => { if(m.parentId===undefined || m.parentId==='') m.parentId=null; return m; });
        state.familyName = d.familyName || 'Shah'; state.bgLayers = d.bgLayers || [];
      } else { state.members = []; state.bgLayers = []; }
      var bn = document.getElementById('brand-name'); if(bn) bn.textContent = state.familyName;
      applyBgSettings();
      var tv=document.getElementById('tree-view'), av=document.getElementById('admin-view');
      if(av && av.style.display !== 'none' && isAdmin()) renderAdmin(); else if(tv && tv.style.display !== 'none') renderTree();
      showSync('✓ connected');
    });
    if(!state.isViewOnly){
      usersRef.on('value', snap => {
        state.users = snap.val() || {};
        if(state.currentUser && state.currentUser.username !== MASTER_USER){
           let key = Object.keys(state.users).find(k => state.users[k].username === state.currentUser.username);
           let dbU = key ? state.users[key] : null;
           if(!dbU) { doLogout(); return; }
           let u = false; if(state.currentUser.status !== dbU.status){ state.currentUser.status=dbU.status; u=true; }
           if(state.currentUser.role !== dbU.role){ state.currentUser.role=dbU.role; u=true; }
           if(u){ localStorage.setItem('famUser', JSON.stringify(state.currentUser)); if(state.currentUser.status === 'approved') unlockApp(); else { document.getElementById('main-nav').style.display='none'; document.getElementById('tree-view').style.display='none'; document.getElementById('admin-view').style.display='none'; document.getElementById('auth-view').style.display='none'; document.getElementById('waiting-overlay').style.display='flex'; } }
        }
        var authV = document.getElementById('auth-view'); if(authV && authV.style.display!=='none' && isAdmin()) renderAuthPanel();
      });
    }
  }

  /* AUTH (PATCHED SECURITY) */
  function checkLocalAuth() {
    const t = new URLSearchParams(window.location.search).get('share');
    if (t) {
       document.getElementById('auth-title').textContent = "Checking secure link...";
       ['auth-user','auth-pass','btn-login-submit','btn-login-toggle'].forEach(id => document.getElementById(id).style.display='none');
       linksRef.child(t).once('value').then(snap => {
           let d = snap.val();
           if(d && d.expiresAt > Date.now()){ state.isViewOnly = true; unlockApp(); }
           else{ document.getElementById('auth-error').textContent = "Link expired/invalid."; let b=document.getElementById('btn-login-toggle'); b.style.display='block'; b.textContent="Return to Login"; b.onclick=()=>window.location.href=window.location.pathname; }
       }); return;
    }
    var s = localStorage.getItem('famUser');
    if(s){ state.currentUser = JSON.parse(s); if(state.currentUser.status === 'approved') unlockApp(); else{ document.getElementById('login-overlay').style.display='none'; document.getElementById('waiting-overlay').style.display='flex'; startSync(); } }
  }
  function toggleAuthMode() {
    var err=document.getElementById('auth-error'), t=document.getElementById('auth-title'), b=document.getElementById('btn-login-submit'), tgl=document.getElementById('btn-login-toggle'); err.textContent='';
    if(state.authMode === 'login'){ state.authMode='register'; t.textContent='create account'; b.textContent='Register'; tgl.textContent='I already have an account'; }
    else{ state.authMode='login'; t.textContent='secure access'; b.textContent='Log In'; tgl.textContent='Create an Account instead'; }
  }
  function doAuth() {
    var un=document.getElementById('auth-user').value.trim(), pw=document.getElementById('auth-pass').value.trim(), err=document.getElementById('auth-error'); err.textContent='';
    if(!un||!pw){ err.textContent='Enter both fields.'; return; }
    if(un.toLowerCase()===MASTER_USER.toLowerCase() && pw===MASTER_PASS){ state.currentUser={username:MASTER_USER,role:'admin',status:'approved'}; localStorage.setItem('famUser', JSON.stringify(state.currentUser)); unlockApp(); return; }
    
    // FIX 3: Basic Base64 encoding to prevent raw plain-text storage
    var encodedPw = btoa(pw);

    var btn=document.getElementById('btn-login-submit'); var o=btn.textContent; btn.textContent='Checking...'; btn.disabled=true;
    usersRef.once('value').then(snap => {
       btn.textContent=o; btn.disabled=false; var users=snap.val()||{};
       var key=Object.keys(users).find(k=>users[k]&&users[k].username&&users[k].username.toLowerCase()===un.toLowerCase()), dbU=key?users[key]:null;
       if(state.authMode==='login'){
          if(!dbU){ err.textContent='Username not found.'; return; }
          if(dbU.password!==encodedPw){ err.textContent='Incorrect password.'; return; }
          state.currentUser={username:dbU.username,role:dbU.role,status:dbU.status}; localStorage.setItem('famUser',JSON.stringify(state.currentUser));
          if(dbU.status==='approved') unlockApp(); else{ document.getElementById('login-overlay').style.display='none'; document.getElementById('waiting-overlay').style.display='flex'; startSync(); }
       } else {
          if(dbU){ err.textContent='Username taken.'; return; }
          if(un.toLowerCase()===MASTER_USER.toLowerCase()){ err.textContent='Reserved.'; return; }
          usersRef.push({username:un,password:encodedPw,role:'member',status:'pending'}).then(()=>{ state.currentUser={username:un,role:'member',status:'pending'}; localStorage.setItem('famUser',JSON.stringify(state.currentUser)); document.getElementById('login-overlay').style.display='none'; document.getElementById('waiting-overlay').style.display='flex'; startSync(); }).catch(e=>err.textContent="Error: "+e.message);
       }
    }).catch(e=>{ btn.textContent=o; btn.disabled=false; err.textContent="Connection error."; });
  }
  function unlockApp() {

  }

  /* PROFILE MODAL */

  /* EXPORT (PATCHED BUG) */
  function exportTree() {
      showToast("Generating Poster..."); var root = document.getElementById('tree-root');
      var obg = root.style.background, opad = root.style.padding;
      
      // FIX 1: Make clone absolutely positioned and 100% size so it fully covers the poster 
      var bgClone = document.getElementById('custom-bg').cloneNode(true); 
      bgClone.style.opacity='1'; 
      bgClone.style.position = 'absolute';
      bgClone.style.width = '100%';
      bgClone.style.height = '100%';
      bgClone.style.zIndex = '-1';
      root.appendChild(bgClone);

      root.style.background = getComputedStyle(document.body).getPropertyValue('--bg').trim(); root.style.padding = "40px"; 
      var btns = document.querySelectorAll('.expand-btn'); btns.forEach(b => b.style.display='none');
      html2canvas(root, { scale: 2, backgroundColor: root.style.background, logging: false }).then(canvas => {
          var a = document.createElement('a'); a.download = state.familyName + '_Family_Tree.png'; a.href = canvas.toDataURL('image/png'); a.click();
          root.style.background=obg; root.style.padding=opad; root.removeChild(bgClone); btns.forEach(b => b.style.display='flex'); showToast("Exported!");
      }).catch(e => {
          root.style.background=obg; root.style.padding=opad; if(root.contains(bgClone)) root.removeChild(bgClone); btns.forEach(b => b.style.display='flex'); showToast("Failed.");
      });
  }

  /* SEARCH & LINEAGE */
  function handleSearch(v) { state.searchQuery = v.toLowerCase(); applySearchAndFilter(); }
  function handleFilter(v) { state.filterMode = v; if(v==='lineage'&&!state.selected) showToast("Click a relative to trace lineage!"); applySearchAndFilter(); }
  function applySearchAndFilter() {
      var fMatch = null, cards = document.querySelectorAll('.person-card'), lids = new Set();
      if(state.filterMode==='lineage'&&state.selected){
          let c=state.members.find(m=>m.id===state.selected); if(c&&c.isSpouse) c=state.members.find(m=>m.id===c.spouse);
          if(c){
              lids.add(c.id); if(c.spouse) lids.add(c.spouse);
              let p=state.members.find(m=>m.id===c.parentId); while(p){ lids.add(p.id); if(p.spouse) lids.add(p.spouse); p=state.members.find(m=>m.id===p.parentId); }
              let s=[c.id]; while(s.length>0){ let i=s.pop(); lids.add(i); let pr=state.members.find(m=>m.id===i); if(pr&&pr.spouse) lids.add(pr.spouse); state.members.filter(m=>m.parentId===i&&!m.isSpouse).forEach(k=>s.push(k.id)); }
          }
      }
      cards.forEach(c => {
          let n=c.getAttribute('data-name').toLowerCase(), d=c.getAttribute('data-dead')==='true', id=c.getAttribute('data-id');
          let ms=state.searchQuery===''||n.includes(state.searchQuery), mf=true;
          if(state.filterMode==='living') mf=!d; else if(state.filterMode==='deceased') mf=d; else if(state.filterMode==='lineage') { if(state.selected) mf=lids.has(id); }
          if(ms&&mf){ c.style.opacity='1'; c.style.transform='scale(1)'; if(state.searchQuery!==''){ c.style.boxShadow='0 0 20px var(--gold)'; c.style.borderColor='var(--gold)'; if(!fMatch) fMatch=c; } else{ c.style.boxShadow='none'; c.style.borderColor='transparent'; } }
          else{ c.style.opacity='0.15'; c.style.transform='scale(0.95)'; c.style.boxShadow='none'; c.style.borderColor='transparent'; }
      });
      if(fMatch&&state.searchQuery!=='') fMatch.scrollIntoView({behavior:'smooth',block:'center',inline:'center'});
  }

  function setLang(l){ state.lang=l; document.querySelectorAll('.lang-btn').forEach((b,i)=>{if(i<2)b.classList.toggle('active',(i===0&&l==='en')||(i===1&&l==='hi'))}); applyLang(); let tv=document.getElementById('tree-view'),av=document.getElementById('admin-view'),au=document.getElementById('auth-view'); if(tv&&tv.style.display!=='none')renderTree(); if(av&&av.style.display!=='none'&&isAdmin())renderAdmin(); if(au&&au.style.display!=='none'&&isAdmin())renderAuthPanel(); }
  function applyLang(){ document.getElementById('tab-tree').textContent=s('navTree'); document.getElementById('tab-admin').textContent=s('navAdmin'); document.getElementById('tab-auth').textContent='Auth Panel'; document.body.classList.toggle('lang-hi',state.lang==='hi'); }

  /* TREE RENDER */
  function toggleExpand(id, e) { if(e) e.stopPropagation(); if(state.expanded[id]) delete state.expanded[id]; else state.expanded[id] = true; renderTree(); }
  function makeAvatar(m, sz){ let av=document.createElement('div'); av.className='avatar'; av.style.cssText=`width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.27)}px`; if(m.photo){ let img=document.createElement('img'); img.src=m.photo; img.onerror=()=>av.textContent=initials(m.name); av.appendChild(img); } else av.textContent=initials(m.name); return av; }
  
  function buildCard(m, sz, fs, pad, cardW, hasKids, isExp, isSpouse){
    let card=document.createElement('div'); card.className='person-card'+(isSpouse?' spouse-card':'')+(state.isViewOnly?' view-only':'');
    card.setAttribute('data-id', m.id); card.setAttribute('data-name', dname(m)+" "+(m.nameHi||"")); card.setAttribute('data-dead', m.deathYear?'true':'false');
    card.style.cssText=`padding:${pad}px;width:${cardW}px;min-width:${cardW}px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;`;
    card.appendChild(makeAvatar(m,sz));
    
    let nm=document.createElement('div'); nm.className='person-name'+(isSpouse?'':' primary'); nm.style.cssText=`font-size:${fs}px;margin-top:6px;width:100%;display:flex;justify-content:center;overflow:visible;`;
    let span=document.createElement('span'); span.style.cssText='display:block;margin:0 -30px;text-align:center;line-height:1.1;'; span.innerHTML=dname(m).replace(/ /g,'<br>'); nm.appendChild(span); card.appendChild(nm);
    
    if(isSpouse){ let sl=document.createElement('div'); sl.className='spouse-label'; sl.style.cssText='width:100%;display:flex;justify-content:center;overflow:visible;margin-top:2px;'; let slSpan=document.createElement('span'); slSpan.style.cssText='display:block;margin:0 -30px;text-align:center;'; slSpan.textContent=s('sp'); sl.appendChild(slSpan); card.appendChild(sl); }
    if(m.birthYear||m.deathYear){ let dt=document.createElement('div'); dt.className='date-label'; let by=m.birthYear?m.birthYear.trim():'', dy=m.deathYear?m.deathYear.trim():''; dt.textContent=(by&&dy)?`${by} - ${dy}`:(by&&!dy)?`${by} - Present`:(!by&&dy)?`Died: ${dy}`:''; card.appendChild(dt); }
    if(hasKids&&!isSpouse){ let btn=document.createElement('div'); btn.className='expand-btn'; btn.innerHTML=isExp?'-':'+'; btn.onclick=e=>toggleExpand(m.id,e); card.appendChild(btn); }
    
    card.onclick = () => {
        if(state.filterMode === 'lineage') { state.selected = m.id; renderTree(); } 
        App.openProfile(m.id); 
    };
    return card;
  }

  function renderLevel(parent, parentId, gen){
    let prim=getPrimaries(parentId); if(!prim.length) return;
    let {sz,fs,pad,cardW,connW} = getSizes(); let topStart = Math.round(sz/2+pad);
    let row=document.createElement('div'); row.className='tree-row'; 
    prim.forEach(m => {
      let col=document.createElement('div'); col.className='tree-col'; 
      let sp=getSpouse(m), kids=getChildren(m), exp = (state.isViewOnly||state.filterMode==='lineage') ? true : !!state.expanded[m.id];
      let pw=document.createElement('div'); pw.style.cssText='display:flex;align-items:flex-start;position:relative;z-index:2;';
      pw.appendChild(buildCard(m,sz,fs,pad,cardW,kids.length>0,exp,false));
      if(sp){
        let conn=document.createElement('div'); conn.style.cssText=`display:flex;align-items:center;padding-top:${topStart-1}px;width:${connW}px;justify-content:center;flex-shrink:0;`;
        conn.innerHTML=`<svg width="${connW}" height="2"><line x1="0" y1="1" x2="${connW}" y2="1" stroke="var(--gold)" stroke-width="2"/></svg>`;
        pw.appendChild(conn); pw.appendChild(buildCard(sp,sz,fs,pad,cardW,false,false,true)); col.style.setProperty('--shift-x',((cardW+connW)/2)+'px');
      } else col.style.setProperty('--shift-x','0px');
      col.appendChild(pw);
      if(kids.length&&exp){
          let dl=document.createElement('div'); dl.style.cssText=`position:absolute;bottom:-30px;width:2px;background:var(--gold);z-index:-1;top:${sp?topStart+'px':'100%'};left:50%;transform:translateX(-50%);`;
          let cr=document.createElement('div'); cr.style.position='relative'; pw.appendChild(dl); renderLevel(cr,m.id,gen+1); col.appendChild(cr);
      }
      row.appendChild(col);
    }); parent.appendChild(row);
  }

  function renderTree(){
    let tv=document.getElementById('tree-view'); let roots=getPrimaries(null);
    if(!roots.length){ tv.innerHTML=`<div class="tree-header"><h1>${s('fam',state.familyName)}</h1></div><div class="empty-state" style="height:300px"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span>${s('sel')}</span></div>`; return; }

        <div class="fg full" style="margin-top:10px;padding-top:15px;border-top:1px solid var(--border);"><label>${s('spN')} (EN)</label><input type="text" id="f-sp" placeholder="${s('bl')}" value="${spN}"></div>
        <div class="fg full"><label>पति/पत्नी (हिंदी)</label><input type="text" id="f-sp-hi" placeholder="${s('bl')}" value="${spNHi}"></div>
        <div class="fg full"><label>Spouse Photo</label><div class="photo-row"><div class="photo-prev" id="pp-sp">${state.prevPhotoSpouse?`<img src="${state.prevPhotoSpouse}">`:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>'}</div><div class="photo-inputs"><div class="url-row"><input type="text" id="p-url-sp" placeholder="${s('pUrl')}" value="${state.prevPhotoSpouse}"><button class="url-apply" onclick="App.applyUrlSp()">${s('app')}</button></div><label class="upload-lbl" for="p-file-sp">${s('upl')}</label><input type="file" id="p-file-sp" accept="image/*" style="display:none" onchange="App.handleFileSp(this)"></div></div></div>
      </div>
      <div class="form-actions">${m?`<button class="btn-del" onclick="App.delMember('${m.id}')">${s('del')}</button>`:''}<button class="btn-cancel" onclick="App.cancelEdit()">${s('can')}</button><button class="btn-save" onclick="App.saveMember()">${s('sv')}</button></div>
    `;
    renderGalleryPreviews(); 
  }

  function renderAuthPanel() {
    if(!isAdmin()) return; let v = document.getElementById('auth-view'); let uHtml='', h=false;
    Object.keys(state.users).forEach(k => {
       let u=state.users[k]; h=true;
       let stat=u.status==='pending'?'<span class="status-pending">Pending</span>':(u.role==='admin'?'<span class="status-admin">Admin</span>':'<span class="status-approved">Approved</span>');
       let a=''; if(u.status==='pending') a=`<button class="auth-act-btn btn-approve" onclick="App.modifyUser('${k}', 'approve')">Approve</button>`;
       else{ if(u.role!=='admin') a+=`<button class="auth-act-btn btn-promote" onclick="App.modifyUser('${k}', 'admin')">Make Admin</button>`; else a+=`<button class="auth-act-btn btn-revoke" onclick="App.modifyUser('${k}', 'demote')">Make Member</button>`; a+=`<button class="auth-act-btn btn-revoke" onclick="App.modifyUser('${k}', 'revoke')">Revoke</button>`; }
       uHtml+=`<div class="user-card"><div class="user-info"><strong>${u.username}</strong>${stat}</div><div class="auth-actions">${a}</div></div>`;
    });
    if(!h) uHtml='<div class="empty-state"><span>No registered users yet.</span></div>';
    let lHtml=`<div class="share-generator"><h3>View-Only Link</h3><div class="share-controls"><select id="share-expiry" class="share-select"><option value="1">1 Hour</option><option value="24">24 Hours</option><option value="168">7 Days</option></select><button class="share-btn" onclick="App.generateShareLink()">Copy Link</button></div></div>`;
    v.innerHTML=`<div class="admin-sidebar"><div class="sidebar-title">Access</div><p style="font-size:12px;color:var(--text3);line-height:1.4;">Approve members or promote to Admin.</p></div><div class="admin-form-wrap"><h2>Authentication</h2><div style="margin-top:1.5rem;">${uHtml}</div>${lHtml}</div>`;
  }

  function modifyUser(k, a) { if(!isAdmin()) return; let r=usersRef.child(k); if(a==='approve')r.update({status:'approved'}); else if(a==='admin')r.update({role:'admin'}); else if(a==='demote')r.update({role:'member'}); else if(a==='revoke')r.remove(); showToast('Updated'); }
  function generateShareLink() { if(!isAdmin()) return; let h=parseInt(document.getElementById('share-expiry').value)||1, tk='share_'+Math.random().toString(36).substr(2,9), e=Date.now()+(h*60*60*1000); linksRef.child(tk).set({expiresAt:e,createdBy:state.currentUser.username}).then(()=>{ let u=window.location.origin+window.location.pathname+'?share='+tk; navigator.clipboard.writeText(u).then(()=>showToast("Link copied!")).catch(()=>prompt("Copy this:",u)); }); }
  function updateFamilyName(){ if(!isAdmin()) return; let v=(document.getElementById('fn-inp')||{}).value; if(!v||!v.trim()) return; state.familyName=v.trim(); saveToFirebase(); showToast(s('sved')); renderTree(); }
  
  // FIX 2: Resetting 'prevGallery' safely on cancellation
  function startNew(){ state.editingId='__new__'; state.prevPhoto=''; state.prevPhotoSpouse=''; state.prevGallery=[]; renderAdmin(); renderForm(null); }
  function cancelEdit(){ state.editingId=null; state.prevPhoto=''; state.prevPhotoSpouse=''; state.prevGallery=[]; renderAdmin(); }
  
  function applyUrl(){ let u=(document.getElementById('p-url')||{}).value||''; u=u.trim(); if(u===''&&state.prevPhoto&&state.prevPhoto.startsWith('data:')) return; state.prevPhoto=u; let pp=document.getElementById('pp'); if(pp) pp.innerHTML=u?`<img src="${u}">`:'?'; }
  function handleFile(inp){ let f=inp.files[0]; if(!f) return; let btn=document.querySelector('.btn-save'); if(btn){btn.disabled=true;btn.textContent='Processing...';} let r=new FileReader(); r.onload=e=>{ let img=new Image(); img.onload=()=>{ let c=document.createElement('canvas'), M=180, w=img.width, h=img.height; if(w>h){if(w>M){h*=M/w;w=M}}else{if(h>M){w*=M/h;h=M}} c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h); state.prevPhoto=c.toDataURL('image/jpeg',0.85); let pp=document.getElementById('pp'); if(pp)pp.innerHTML=`<img src="${state.prevPhoto}">`; if(btn){btn.disabled=false;btn.textContent=s('sv');} }; img.src=e.target.result; }; r.readAsDataURL(f); }
  function applyUrlSp(){ let u=(document.getElementById('p-url-sp')||{}).value||''; u=u.trim(); if(u===''&&state.prevPhotoSpouse&&state.prevPhotoSpouse.startsWith('data:')) return; state.prevPhotoSpouse=u; let pp=document.getElementById('pp-sp'); if(pp) pp.innerHTML=u?`<img src="${u}">`:'?'; }
  function handleFileSp(inp){ let f=inp.files[0]; if(!f) return; let btn=document.querySelector('.btn-save'); if(btn){btn.disabled=true;btn.textContent='Processing...';} let r=new FileReader(); r.onload=e=>{ let img=new Image(); img.onload=()=>{ let c=document.createElement('canvas'), M=180, w=img.width, h=img.height; if(w>h){if(w>M){h*=M/w;w=M}}else{if(h>M){w*=M/h;h=M}} c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h); state.prevPhotoSpouse=c.toDataURL('image/jpeg',0.85); let pp=document.getElementById('pp-sp'); if(pp)pp.innerHTML=`<img src="${state.prevPhotoSpouse}">`; if(btn){btn.disabled=false;btn.textContent=s('sv');} }; img.src=e.target.result; }; r.readAsDataURL(f); }

  async function saveMember(){
    if(!isAdmin()) return;
    const GEMINI_API_KEY = 'YOUR_API_KEY_HERE';
    if(!state.members) state.members = []; if(!Array.isArray(state.members)) state.members = Object.keys(state.members).map(k=>state.members[k]);
    
    let fn=(document.getElementById('f-fn')||{}).value||'', ln=(document.getElementById('f-ln')||{}).value||''; fn=fn.trim(); ln=ln.trim();
    let fnHi=(document.getElementById('f-fn-hi')||{}).value||'', lnHi=(document.getElementById('f-ln-hi')||{}).value||''; fnHi=fnHi.trim(); lnHi=lnHi.trim();
    if(!fn && !fnHi){ showToast('Enter name'); return; }
    let name=ln?fn+' '+ln:fn, nameHi=fnHi?(lnHi?fnHi+' '+lnHi:fnHi):'';
    
    let bYear=(document.getElementById('f-by')||{}).value||'', dYear=(document.getElementById('f-dy')||{}).value||'';
    let dob=(document.getElementById('f-dob')||{}).value||'', mDate=(document.getElementById('f-mdate')||{}).value||'', phone=(document.getElementById('f-phone')||{}).value||'', address=(document.getElementById('f-address')||{}).value||'';
    let parentId=(document.getElementById('f-par')||{}).value||null, gen=parseInt((document.getElementById('f-gen')||{}).value||'0')||0;
    let spN=((document.getElementById('f-sp')||{}).value||'').trim(), spNHi=((document.getElementById('f-sp-hi')||{}).value||'').trim();

    async function qTrans(t, l) { if(!GEMINI_API_KEY || GEMINI_API_KEY==='YOUR_API_KEY_HERE') return ''; try { let u='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+GEMINI_API_KEY, res=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:`Transliterate into ${l}. Return ONLY the translated name: ${t}`}]}]})}), d=await res.json(); return d.candidates?d.candidates[0].content.parts[0].text.trim():''; } catch(e){return '';} }
    
    let btn=document.querySelector('.btn-save'); let ob=btn?btn.textContent:'Save'; if(btn) btn.disabled=true;
    if(name&&!nameHi){ if(btn)btn.textContent='Translating...'; nameHi=await qTrans(name,'Hindi (Devanagari)'); } else if(nameHi&&!name){ if(btn)btn.textContent='Translating...'; name=await qTrans(nameHi,'English (Roman)'); }
    if(spN&&!spNHi){ if(btn)btn.textContent='Translating...'; spNHi=await qTrans(spN,'Hindi (Devanagari)'); } else if(spNHi&&!spN){ if(btn)btn.textContent='Translating...'; spN=await qTrans(spNHi,'English (Roman)'); }
    if(btn){ btn.textContent=ob; btn.disabled=false; } if(!name)name=nameHi; if(!nameHi)nameHi=name;

    let pD = { name, nameHi, photo:state.prevPhoto, parentId, generation:gen, spouse:'', isSpouse:false, birthYear:bYear.trim(), deathYear:dYear.trim(), dob:dob.trim(), marriageDate:mDate.trim(), phone:phone.trim(), address:address.trim(), gallery: state.prevGallery };
    if(state.editingId==='__new__'){
      pD.id='m'+Date.now(); state.members.push(pD);
      if(spN||spNHi){ let sid=pD.id+'s'; pD.spouse=sid; state.members.push({id:sid,name:spN,nameHi:spNHi,photo:state.prevPhotoSpouse,parentId:null,generation:gen,spouse:pD.id,isSpouse:true}); }
      state.editingId=pD.id;
    } else {
      let m=state.members.find(x=>x&&x.id===state.editingId);
      if(m){ 
        Object.assign(m, pD);
        if(spN||spNHi){
          if(m.spouse){ let sp=state.members.find(x=>x&&x.id===m.spouse); if(sp){sp.name=spN; sp.nameHi=spNHi; sp.photo=state.prevPhotoSpouse;} }
          else{ let sid=m.id+'s'; m.spouse=sid; state.members.push({id:sid,name:spN,nameHi:spNHi,photo:state.prevPhotoSpouse,parentId:null,generation:gen,spouse:m.id,isSpouse:true}); }
        } else if(m.spouse){ state.members=state.members.filter(x=>x&&x.id!==m.spouse); m.spouse=''; }
      }
    }
    saveToFirebase(); showToast(s('sved')); renderAdmin(); renderTree();
  }

  function delMember(id){
    if(!isAdmin()) return; let m=state.members.find(x=>x&&x.id===id);
    if(m&&m.spouse){ state.members=state.members.filter(x=>x&&x.id!==m.spouse); delete state.expanded[m.spouse]; }
    state.members.filter(x=>x&&x.parentId===id).forEach(c=>c.parentId=null); state.members=state.members.filter(x=>x&&x.id!==id);
    delete state.expanded[id]; state.editingId=null; saveToFirebase(); showToast(s('dlted')); renderAdmin(); renderTree();
  }

  function showView(v, btn){
    if((v==='admin'||v==='auth')&&!isAdmin()){ showToast("Blocked."); return; }
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active');
    ['tree-view','admin-view','auth-view'].forEach(id=>document.getElementById(id).style.display='none');
    document.getElementById(v+'-view').style.display = v==='tree'?'block':'grid';
    let bg=document.getElementById('custom-bg'), cv=document.querySelector('.bg-canvas');
    if(v==='tree'){ if(state.bgLayers&&state.bgLayers.length) bg.style.opacity='1'; cv.style.opacity=(state.bgLayers&&state.bgLayers.length)?'0':'1'; }
    else{ bg.style.opacity='0'; cv.style.opacity='1'; }
    if(v==='tree') renderTree(); else if(v==='admin') renderAdmin(); else if(v==='auth') renderAuthPanel();
  }

  window.App = { doAuth, toggleAuthMode, setLang, showView, startNew, cancelEdit, updateFamilyName, applyUrl, handleFile, applyUrlSp, handleFileSp, saveMember, delMember, doLogout, modifyUser, generateShareLink, exportTree, handleSearch, handleFilter, setTheme, openProfile, closeProfile, saveBgSettings, clearBgSettings, handleBgFile, handleDropZoneOver, handleDropZoneLeave, handleDropZoneDrop, liveUpdateBg: ()=>applyBgSettings(), handleGalleryFiles, removeGalleryImg, updateLayer, removeLayer };
  checkLocalAuth();
})();
</script>
</html>
