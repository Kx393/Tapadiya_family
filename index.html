<script>
(function() {

  const STRINGS = {
    en:{
      navTree: 'family tree', navAdmin: 'admin panel', navDesign: 'themes & designs',
      fam:'The <em>$1</em> Family', hint:'Click a name to view details', sp:'spouse', add:'+ add new member', all:'all members',

      fam:'<em>$1</em> परिवार', hint:'विवरण देखने के लिए नाम पर क्लिक करें', sp:'पति/पत्नी', add:'+ सदस्य जोड़ें', all:'सभी सदस्य', 
      root:'मूल', desc:'वंशज', edit:'संपादित करें', new:'नया सदस्य', par:'अभिभावक', gen:'पीढ़ी स्तर', spN:'पति/पत्नी का नाम',

      rootLevel: '— मूल (शीर्ष स्तर) —', genLabels: ['मूल', 'बच्चे', 'पोते-पोती', 'परपोते-परपोती', 'पीढ़ी 4+'],
      photo: 'फ़ोटो', firstName: 'पहला नाम', lastName: 'अंतिम नाम'
    }
  };

  const getEl = id => document.getElementById(id);
  const s = (k, v) => { let t = STRINGS[state.lang][k] || STRINGS['en'][k]; return v ? t.replace('$1', v) : t; };

  let state = {
    lang: 'en', theme: 'dark', familyName: 'Shah', bgLayers: [], textLayers: [], dbReady: false, members: [],
    expanded: {}, users: {}, currentUser: null, authMode: 'login', selected: null, editingId: null,
    prevPhoto: '', prevPhotoSpouse: '', prevGallery: [], isViewOnly: false, searchQuery: '', scrollTarget: null
  };

  const isAdmin = () => state.currentUser && state.currentUser.role === 'admin' && !state.isViewOnly;

  function setTheme(t) {
    state.theme = t; document.body.className = '';
    if(t !== 'dark') document.body.classList.add('theme-' + t);
    localStorage.setItem('famTheme', t);
  }
  let savedTheme = localStorage.getItem('famTheme');
  if(savedTheme) { getEl('theme-picker').value = savedTheme; setTheme(savedTheme); }

  /* --- MULTI-LAYER BACKGROUND ENGINE --- */
  function applyBgSettings() {
    const bgContainer = getEl('custom-bg');
    const cv = document.querySelector('.bg-canvas');
    bgContainer.innerHTML = '';
    let bgHTMLContent = '';
    
    if (state.bgLayers && state.bgLayers.length > 0) {
      state.bgLayers.forEach(l => {
        bgHTMLContent += `<div class="custom-bg-layer" style="background-image: url('${l.url}'); background-size: ${l.zoom || 100}%; background-position: ${l.x || 50}% ${l.y || 50}%;"></div>`;
      });
      bgContainer.innerHTML = bgHTMLContent;
      document.querySelectorAll('.orb').forEach(o => o.style.display = 'none');
      
      let activeTabBtn = document.querySelector('.nav-tab.active');
      if (activeTabBtn && activeTabBtn.id === 'tab-tree') {
          bgContainer.style.opacity = '1';
          if(cv) cv.style.opacity = '0';
      }
    } else {
      bgContainer.style.opacity = '0';
      if(cv) cv.style.opacity = '1';
      document.querySelectorAll('.orb').forEach(o => o.style.display = 'block');
    }
  }

  function handleDropZoneOver(e) { e.preventDefault(); e.currentTarget.classList.add('dragover'); }
  function handleDropZoneLeave(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); }
  function handleDropZoneDrop(e) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); let f = e.dataTransfer.files[0]; if(f) processBgFile(f); }
  function handleBgFile(inp) { let f = inp.files[0]; if(f) processBgFile(f); }
  
  function processBgFile(file) {
    let btn = getEl('btn-save-bg'); if(btn) { btn.disabled = true; btn.textContent = 'Processing...'; }
    let r = new FileReader();
    r.onload = e => {
      let img = new Image();
      img.onload = () => {
        let c = document.createElement('canvas'), M = 1600, w = img.width, h = img.height;
        if(w > h) { if(w > M) { h *= M/w; w = M; } } else { if(h > M) { w *= M/h; h = M; } }
        c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h);
        if(!state.bgLayers) state.bgLayers = [];
        state.bgLayers.push({ id: 'bg'+Date.now(), url: c.toDataURL('image/jpeg', 0.8), zoom: 100, x: 50, y: 50 });
        applyBgSettings(); refreshStudioPreview(); renderDesignStudio();
      };
      img.src = e.target.result;
    };
    r.readAsDataURL(file);
  }
  function updateLayer(id, p, v) { let l = state.bgLayers.find(x => x.id === id); if(l) { l[p] = v; applyBgSettings(); refreshStudioPreview(); } }
  function removeLayer(id) { state.bgLayers = state.bgLayers.filter(x => x.id !== id); applyBgSettings(); renderDesignStudio(); }
  function saveBgSettings() { if(isAdmin()) { saveToFirebase(); showToast('Backgrounds saved!'); } }
  function clearBgSettings() {
      if(!isAdmin()) return;
      state.bgLayers = [];
      saveToFirebase(); applyBgSettings(); renderDesignStudio(); showToast('All layers cleared');
  }

  /* --- CUSTOM TEXT OVERLAY ENGINE --- */
  function applyTextSettings() {
    const container = getEl('custom-text-container');
    if(!container) return;
    container.innerHTML = '';
    if (state.textLayers && state.textLayers.length > 0) {
      state.textLayers.forEach(l => {
        let d = document.createElement('div');
        d.className = 'custom-text-layer';
        d.style.cssText = `left: ${l.x||50}%; top: ${l.y||50}%; font-size: ${l.size||40}px; color: ${l.color||'#c9a96e'};`;
        d.innerHTML = l.text.replace(/\n/g, '<br>');
        container.appendChild(d);
      });
      let activeTabBtn = document.querySelector('.nav-tab.active');
      if (activeTabBtn && activeTabBtn.id === 'tab-tree') container.style.opacity = '1';
    } else {
      container.style.opacity = '0';
    }
  }
  
  function addTextLayer() {
    let input = getEl('new-text-input');
    let val = input.value.trim();
    if(!val) return;
    if(!state.textLayers) state.textLayers = [];
    state.textLayers.push({ id: 'txt'+Date.now(), text: val, size: 60, x: 50, y: 15, color: '#c9a96e' });
    input.value = '';
    applyTextSettings(); renderDesignStudio();
  }
  function updateTextLayer(id, p, v) { let l = state.textLayers.find(x => x.id === id); if(l) { l[p] = v; applyTextSettings(); refreshStudioPreview(); } }
  function removeTextLayer(id) { state.textLayers = state.textLayers.filter(x => x.id !== id); applyTextSettings(); renderDesignStudio(); }
  function saveTextSettings() { if(isAdmin()) { saveToFirebase(); showToast('Text saved!'); } }

  /* --- MULTI-GALLERY UPLOADER --- */
  function handleGalleryFiles(inp) {
    let files = inp.files; if(!files || !files.length) return;
    let btn = document.querySelector('.btn-save'); if(btn) { btn.disabled = true; btn.textContent = 'Processing...'; }
    let processed = 0;
    for(let i=0; i<files.length; i++) {
      let r = new FileReader();
      r.onload = e => {
        let img = new Image();
        img.onload = () => {
          let c = document.createElement('canvas'), M = 800, w = img.width, h = img.height;
          if(w>h) { if(w>M){h*=M/w; w=M;} } else { if(h>M){w*=M/h; h=M;} }
          c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h);
          state.prevGallery.push(c.toDataURL('image/jpeg', 0.7)); processed++;
          if(processed === files.length) { if(btn) { btn.disabled = false; btn.textContent = s('sv'); } renderGalleryPreviews(); }
        };
        img.src = e.target.result;
      };
      r.readAsDataURL(files[i]);
    }
  }
  function renderGalleryPreviews() {
    let c = getEl('gallery-previews'); if(!c) return;
    c.innerHTML = state.prevGallery.map((src, i) => `<div style="position:relative; width:60px; height:60px; border-radius:8px; overflow:hidden; border:1px solid var(--border2); flex-shrink:0;"><img src="${src}" style="width:100%; height:100%; object-fit:cover;"><div onclick="App.removeGalleryImg(${i})" style="position:absolute; top:2px; right:2px; background:rgba(0,0,0,0.7); color:#fff; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:10px;">×</div></div>`).join('');
  }
  function removeGalleryImg(i) { state.prevGallery.splice(i, 1); renderGalleryPreviews(); }

  /* --- CORE UTILS --- */
  function getSizes() {
    let w = window.innerWidth;
    if(w <= 480) return {sz:44, fs:10, pad:4, cardW:52, connW:12}; 
    if(w <= 768) return {sz:48, fs:11, pad:5, cardW:58, connW:14}; 
    return {sz:52, fs:12, pad:6, cardW:64, connW:16};               
  }
  window.addEventListener('resize', () => { if(state.dbReady && getEl('tree-view').style.display !== 'none') renderTree(); });
  
  const initials = n => n ? n.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase() : '??';
  const dname = m => state.lang==='hi' && m.nameHi ? m.nameHi : m.name;
  const getPrimaries = pid => state.members.filter(m => m && (m.parentId||null) === (pid||null) && !m.isSpouse);
  const getSpouse = m => m.spouse ? state.members.find(x => x && x.id === m.spouse) || null : null;
  const getChildren = m => state.members.filter(x => x && x.parentId === m.id && !x.isSpouse);
  
  function showToast(msg) {
    let t = getEl('toast'); t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200);
  }
  function showSync(msg, col) {
    if(state.isViewOnly) return; 
    let p = getEl('sync-pill'); p.textContent = msg; p.style.color = col || 'var(--gold)'; p.style.opacity = '1';
    clearTimeout(p._t); p._t = setTimeout(() => p.style.opacity = '0', 2500);
  }

  /* --- DATA SYNC --- */
  function saveToFirebase(){
    if(!state.dbReady || state.isViewOnly) return;
    try {
      let payload = JSON.parse(JSON.stringify({members: state.members, familyName: state.familyName, bgLayers: state.bgLayers, textLayers: state.textLayers, v: 1}));
      dataRef.set(payload).then(() => showSync('✓ synced')).catch(() => showSync('⚠ sync failed', '#f09595'));
    } catch(e) { showSync('⚠ data error', '#f09595'); }
  }

  function startSync(){
    showSync('connecting…', 'var(--text3)');
    dataRef.on('value', snap => {
      let d = snap.val(); state.dbReady = true;
      if(d){
        let rm = d.members || []; if(!Array.isArray(rm) && typeof rm === 'object') rm = Object.keys(rm).map(k => rm[k]);
        state.members = rm.filter(Boolean).map(m => { if(m.parentId === undefined || m.parentId === '') m.parentId = null; return m; });
        state.familyName = d.familyName || 'Shah'; 
        state.bgLayers = d.bgLayers || [];
        state.textLayers = d.textLayers || [];
      } else { state.members = []; state.bgLayers = []; state.textLayers = []; }
      
      let bn = getEl('brand-name'); if(bn) bn.textContent = state.familyName;
      applyBgSettings();
      applyTextSettings();

      let activeTabBtn = document.querySelector('.nav-tab.active') || getEl('tab-tree');
      let activeView = activeTabBtn.id.replace('tab-', '');
      if(activeView !== 'tree' && !isAdmin()) { activeView = 'tree'; activeTabBtn = getEl('tab-tree'); }
      showView(activeView, activeTabBtn);
      
      showSync('✓ connected');
    });

    if(!state.isViewOnly){
      usersRef.on('value', snap => {
        state.users = snap.val() || {};
        if(state.currentUser && state.currentUser.username !== MASTER_USER){
           let key = Object.keys(state.users).find(k => state.users[k].username === state.currentUser.username);
           let dbU = key ? state.users[key] : null;
           if(!dbU) { doLogout(); return; }
           let u = false; 
           if(state.currentUser.status !== dbU.status) { state.currentUser.status = dbU.status; u = true; }
           if(state.currentUser.role !== dbU.role) { state.currentUser.role = dbU.role; u = true; }
           if(u) {
              localStorage.setItem('famUser', JSON.stringify(state.currentUser));
              if(state.currentUser.status === 'approved') unlockApp(); 
              else {
                 getEl('main-nav').style.display='none'; getEl('tree-view').style.display='none';
                 getEl('admin-view').style.display='none'; getEl('design-view').style.display='none'; getEl('auth-view').style.display='none';
                 getEl('waiting-overlay').style.display='flex';
              }
           }
        }
        let authV = getEl('auth-view'); if(authV && authV.style.display !== 'none' && isAdmin()) renderAuthPanel();
      });
    }
  }

  /* --- AUTH & LOGIN --- */
  function checkLocalAuth() {
    const t = new URLSearchParams(window.location.search).get('share');
    if(t) {
       getEl('auth-title').textContent = "Checking secure link...";
       ['auth-user','auth-pass','btn-login-submit','btn-login-toggle'].forEach(id => getEl(id).style.display='none');
       linksRef.child(t).once('value').then(snap => {
           let d = snap.val();
           if(d && d.expiresAt > Date.now()) { state.isViewOnly = true; unlockApp(); }
           else {
               getEl('auth-error').textContent = "Link expired/invalid.";
               let b = getEl('btn-login-toggle'); b.style.display='block'; b.textContent="Return to Login";
               b.onclick = () => window.location.href = window.location.pathname;
           }
       }).catch(e => { getEl('auth-error').textContent = "Connection error."; });
       return;
    }
    let s = localStorage.getItem('famUser');
    if(s){ 
      state.currentUser = JSON.parse(s);
      if(state.currentUser.status === 'approved') unlockApp();
      else { getEl('login-overlay').style.display='none'; getEl('waiting-overlay').style.display='flex'; startSync(); } 
    }
  }

  function toggleAuthMode() {
    let err = getEl('auth-error'), t = getEl('auth-title'), b = getEl('btn-login-submit'), tgl = getEl('btn-login-toggle'); err.textContent = '';
    if(state.authMode === 'login') {
      state.authMode = 'register'; t.textContent = 'create account'; b.textContent = 'Register'; tgl.textContent = 'I already have an account';
    } else {
      state.authMode = 'login'; t.textContent = 'secure access'; b.textContent = 'Log In'; tgl.textContent = 'Create an Account instead';
    }
  }

  function doAuth() {
    let un = getEl('auth-user').value.trim(), pw = getEl('auth-pass').value.trim(), err = getEl('auth-error'); err.textContent = '';
    if(!un || !pw) { err.textContent = 'Enter both fields.'; return; }
    
    if(un.toLowerCase() === MASTER_USER.toLowerCase() && pw === MASTER_PASS) {
       state.currentUser = { username: MASTER_USER, role: 'admin', status: 'approved' };
       localStorage.setItem('famUser', JSON.stringify(state.currentUser)); unlockApp(); return;
    }
    
    let encodedPw = btoa(pw);

    let btn = getEl('btn-login-submit'); let o = btn.textContent; btn.textContent = 'Checking...'; btn.disabled = true;
    usersRef.once('value').then(snap => {
       btn.textContent = o; btn.disabled = false;
       let users = snap.val() || {};
       let key = Object.keys(users).find(k => users[k] && users[k].username && users[k].username.toLowerCase() === un.toLowerCase());
       let dbU = key ? users[key] : null;

       if(state.authMode === 'login') {
          if(!dbU) { err.textContent = 'Username not found.'; return; }
          if(dbU.password !== encodedPw && dbU.password !== pw) { err.textContent = 'Incorrect password.'; return; }
          
          state.currentUser = { username: dbU.username, role: dbU.role, status: dbU.status };
          localStorage.setItem('famUser', JSON.stringify(state.currentUser));
          
          if(dbU.status === 'approved') unlockApp();
          else { getEl('login-overlay').style.display='none'; getEl('waiting-overlay').style.display='flex'; startSync(); }
       } else {
          if(dbU) { err.textContent = 'Username taken.'; return; }
          if(un.toLowerCase() === MASTER_USER.toLowerCase()) { err.textContent = 'Reserved.'; return; }
          usersRef.push({username: un, password: encodedPw, role: 'member', status: 'pending'}).then(() => {
             state.currentUser = { username: un, role: 'member', status: 'pending' };
             localStorage.setItem('famUser', JSON.stringify(state.currentUser));
             getEl('login-overlay').style.display='none'; getEl('waiting-overlay').style.display='flex'; startSync();
          }).catch(e => err.textContent = "Error: " + e.message);
       }
    }).catch(e => {
       btn.textContent = o; btn.disabled = false;
       console.error(e);
       err.textContent = "Database connection error.";
    });
  }

  function unlockApp() {
    getEl('login-overlay').style.display='none'; getEl('waiting-overlay').style.display='none';
    getEl('main-nav').style.display='flex'; getEl('tab-admin').style.display='none'; getEl('tab-design').style.display='none'; getEl('tab-auth').style.display='none';
    
    if(isAdmin()) { getEl('tab-admin').style.display='block'; getEl('tab-design').style.display='block'; getEl('tab-auth').style.display='block'; }

    let tv = getEl('tree-view'), av = getEl('admin-view'), au = getEl('auth-view');

  function doLogout() { localStorage.removeItem('famUser'); window.location.href = window.location.pathname; }

  /* --- PROFILE MODAL & GALLERY --- */
  function openProfile(id) {
     let m = state.members.find(x => x.id === id); if(!m) return;
     getEl('pm-av').innerHTML = m.photo ? `<img src="${m.photo}">` : initials(m.name);
     getEl('pm-name').textContent = dname(m);
     
     let by = m.birthYear ? m.birthYear.trim() : '', dy = m.deathYear ? m.deathYear.trim() : '', ds = '';
     if(by && dy) ds = `${by} - ${dy}`; else if(by && !dy) ds = `${by} - Present`; else if(!by && dy) ds = `Died: ${dy}`;
     getEl('pm-dates').textContent = ds;
     
     let dh = '';
     if(state.isViewOnly) {
         dh = '<div class="modal-private">Detailed information is hidden for guest viewers.</div>';
     } else {
         if(m.dob) dh += `<div class="modal-row"><span>Date of Birth</span><div>${m.dob}</div></div>`;
         
         let mDate = m.marriageDate;
         if(!mDate && m.isSpouse && m.spouse) {
             let partner = state.members.find(x => x && x.id === m.spouse);
             if(partner) mDate = partner.marriageDate;
         }
         if(mDate) dh += `<div class="modal-row"><span>Marriage Date</span><div>${mDate}</div></div>`;
         
         if(m.phone) dh += `<div class="modal-row"><span>Phone Number</span><div>${m.phone}</div></div>`;
         if(m.address) dh += `<div class="modal-row"><span>Address</span><div>${m.address}</div></div>`;
         if(dh === '') dh = '<div class="modal-private">No additional details available.</div>';
         
         let gallery = m.gallery;
         if((!gallery || gallery.length === 0) && m.isSpouse && m.spouse) {
             let partner = state.members.find(x => x && x.id === m.spouse);
             if(partner) gallery = partner.gallery;
         }
         
         if(gallery && gallery.length > 0) {
            dh += `<div style="margin-top:1.5rem; border-top:1px solid var(--border2); padding-top:1rem;"><span style="display:block; font-size:10px; text-transform:uppercase; color:var(--text3); letter-spacing:0.08em; margin-bottom:8px;">Photo Gallery</span><div class="modal-gallery">`;
            gallery.forEach(src => dh += `<a href="${src}" target="_blank"><img src="${src}"></a>`);
            dh += `</div></div>`;
         }
     }
     getEl('pm-details').innerHTML = dh;
     getEl('profile-modal').classList.add('show');
  }
  function closeProfile() { getEl('profile-modal').classList.remove('show'); }

  /* --- POSTER EXPORT --- */
  function exportTree() {
      showToast("Generating Poster..."); 
      let root = getEl('tree-root');
      let obg = root.style.background, opad = root.style.padding;
      
      let bgClone = getEl('custom-bg').cloneNode(true); 
      bgClone.style.opacity = '1'; bgClone.style.position = 'absolute'; bgClone.style.inset = '0';
      bgClone.style.width = '100%'; bgClone.style.height = '100%'; bgClone.style.zIndex = '-2';
      
      let txtClone = getEl('custom-text-container').cloneNode(true);
      txtClone.style.opacity = '1'; txtClone.style.position = 'absolute'; txtClone.style.inset = '0';
      txtClone.style.width = '100%'; txtClone.style.height = '100%'; txtClone.style.zIndex = '-1';

      root.appendChild(bgClone);
      root.appendChild(txtClone);

      root.style.background = getComputedStyle(document.body).getPropertyValue('--bg').trim(); 
      root.style.padding = "40px"; 
      
      let btns = document.querySelectorAll('.expand-btn'); btns.forEach(b => b.style.display = 'none');
      
      html2canvas(root, { scale: 2, backgroundColor: root.style.background, logging: false }).then(canvas => {
          let a = document.createElement('a'); a.download = state.familyName + '_Family_Tree.png'; a.href = canvas.toDataURL('image/png'); a.click();
          root.style.background = obg; root.style.padding = opad; 
          if(root.contains(bgClone)) root.removeChild(bgClone);
          if(root.contains(txtClone)) root.removeChild(txtClone);
          btns.forEach(b => b.style.display = 'flex'); showToast("Exported!");
      }).catch(e => {
          root.style.background = obg; root.style.padding = opad; 
          if(root.contains(bgClone)) root.removeChild(bgClone); 
          if(root.contains(txtClone)) root.removeChild(txtClone);
          btns.forEach(b => b.style.display = 'flex'); showToast("Export failed.");
      });
  }

  /* --- SEARCH (FILTERS REMOVED) --- */

      let fMatch = null, cards = document.querySelectorAll('.person-card');
      cards.forEach(c => {
          let n = c.getAttribute('data-name').toLowerCase();

  /* --- TREE RENDER --- */
  function toggleExpand(id, e) { 
      if(e) e.stopPropagation(); 
      if(state.expanded[id]) delete state.expanded[id]; else state.expanded[id] = true; 
      state.scrollTarget = id; // FIX: Lock target for smooth scroll
      renderTree(); 
  }
  
  function makeAvatar(m, sz) { 
      let av = document.createElement('div'); av.className = 'avatar'; av.style.cssText = `width:${sz}px;height:${sz}px;font-size:${Math.round(sz*0.27)}px`; 
      if(m.photo) { let img = document.createElement('img'); img.src = m.photo; img.onerror = () => av.textContent = initials(m.name); av.appendChild(img); } 
      else { av.textContent = initials(m.name); } 
      return av; 
  }
  
  function buildCard(m, sz, fs, pad, cardW, hasKids, isExp, isSpouse) {
    let card = document.createElement('div'); 
    card.className = 'person-card' + (isSpouse ? ' spouse-card' : '') + (state.isViewOnly ? ' view-only' : '') + (m.id === state.selected ? ' selected' : '');
    card.setAttribute('data-id', m.id); card.setAttribute('data-name', dname(m) + " " + (m.nameHi || "")); card.setAttribute('data-dead', m.deathYear ? 'true' : 'false');
    card.style.cssText = `padding:${pad}px; width:${cardW}px; min-width:${cardW}px; flex-shrink:0; display:flex; flex-direction:column; align-items:center;`;
    
    card.appendChild(makeAvatar(m, sz));
    
    let nm = document.createElement('div'); nm.className = 'person-name' + (isSpouse ? '' : ' primary'); nm.style.cssText = `font-size:${fs}px; margin-top:6px; width:100%; display:flex; justify-content:center; overflow:visible;`;
    let span = document.createElement('span'); span.style.cssText = 'display:block; margin: 0 -30px; text-align:center; line-height:1.1;'; 
    span.innerHTML = dname(m).replace(/ /g, '<br>'); nm.appendChild(span); card.appendChild(nm);
    
    if(isSpouse) { 
        let sl = document.createElement('div'); sl.className = 'spouse-label'; sl.style.cssText = 'width:100%; display:flex; justify-content:center; overflow:visible; margin-top:2px;'; 
        let slSpan = document.createElement('span'); slSpan.style.cssText = 'display:block; margin: 0 -30px; text-align:center;'; slSpan.textContent = s('sp'); sl.appendChild(slSpan); card.appendChild(sl); 
    }
    
    if(m.birthYear || m.deathYear) { 
        let dt = document.createElement('div'); dt.className = 'date-label'; 
        let by = m.birthYear ? m.birthYear.trim() : '', dy = m.deathYear ? m.deathYear.trim() : ''; 
        dt.textContent = (by && dy) ? `${by} - ${dy}` : (by && !dy) ? `${by} - Present` : (!by && dy) ? `Died: ${dy}` : ''; 
        card.appendChild(dt); 
    }
    
    if(hasKids && !isSpouse) { 
        let btn = document.createElement('div'); btn.className = 'expand-btn'; btn.innerHTML = isExp ? '-' : '+'; 
        btn.onclick = e => toggleExpand(m.id, e); card.appendChild(btn); 
    }
    
    card.onclick = () => { App.openProfile(m.id); };
    return card;
  }

  function renderLevel(parent, parentId, gen) {
    let prim = getPrimaries(parentId); if(!prim.length) return;
    let {sz, fs, pad, cardW, connW} = getSizes(); let topStart = Math.round(sz/2 + pad);
    let row = document.createElement('div'); row.className = 'tree-row'; 
    
    prim.forEach(m => {
      let col = document.createElement('div'); col.className = 'tree-col'; 
      let sp = getSpouse(m), kids = getChildren(m), exp = state.isViewOnly ? true : !!state.expanded[m.id];
      let pw = document.createElement('div'); pw.style.cssText = 'display: flex; align-items: flex-start; position: relative; z-index: 2;';
      
      pw.appendChild(buildCard(m, sz, fs, pad, cardW, kids.length > 0, exp, false));
      
      if(sp) {
        let conn = document.createElement('div'); conn.style.cssText = `display:flex; align-items:center; padding-top:${topStart - 1}px; width:${connW}px; justify-content: center; flex-shrink: 0;`;
        conn.innerHTML = `<svg width="${connW}" height="2"><line x1="0" y1="1" x2="${connW}" y2="1" stroke="var(--gold)" stroke-width="2"/></svg>`;
        pw.appendChild(conn); pw.appendChild(buildCard(sp, sz, fs, pad, cardW, false, false, true)); 
        col.style.setProperty('--shift-x', ((cardW + connW) / 2) + 'px');
      } else { col.style.setProperty('--shift-x', '0px'); }
      col.appendChild(pw);
      
      if(kids.length && exp) {
          let dl = document.createElement('div'); dl.style.cssText = `position: absolute; bottom: -30px; width: 2px; background: var(--gold); z-index: -1; top: ${sp ? topStart + 'px' : '100%'}; left: 50%; transform: translateX(-50%);`;
          let cr = document.createElement('div'); cr.style.position = 'relative'; 
          pw.appendChild(dl); renderLevel(cr, m.id, gen + 1); col.appendChild(cr);
      }
      row.appendChild(col);
    }); 
    parent.appendChild(row);
  }

  function handleFile(inp) { 
      let f = inp.files[0]; if(!f) return; 
      let btn = document.querySelector('.btn-save'); if(btn){ btn.disabled=true; btn.textContent='Processing...'; } 
      let r = new FileReader(); r.onload = e => { 
          let img = new Image(); img.onload = () => { 
              let c = document.createElement('canvas'), M = 180, w = img.width, h = img.height; 
              if(w > h) { if(w > M) { h *= M/w; w = M; } } else { if(h > M) { w *= M/h; h = M; } } 
              c.width = w; c.height = h; c.getContext('2d').drawImage(img, 0, 0, w, h); 
              state.prevPhoto = c.toDataURL('image/jpeg', 0.85); 
              let pp = getEl('pp'); if(pp) pp.innerHTML = `<img src="${state.prevPhoto}">`; 
              let pu = getEl('p-url'); if(pu) pu.value = ''; 
              if(btn) { btn.disabled=false; btn.textContent=s('sv'); } 
          }; 
          img.src = e.target.result; 
      }; 
      r.readAsDataURL(f); 
  }

  async function saveMember() {
    if(!isAdmin()) return;
    const GEMINI_API_KEY = 'YOUR_API_KEY_HERE';
    if(!state.members) state.members = []; 
    if(!Array.isArray(state.members)) state.members = Object.keys(state.members).map(k => state.members[k]);
    
    let fn = (getEl('f-fn')||{}).value||'', ln = (getEl('f-ln')||{}).value||''; fn=fn.trim(); ln=ln.trim();
    let fnHi = (getEl('f-fn-hi')||{}).value||'', lnHi = (getEl('f-ln-hi')||{}).value||''; fnHi=fnHi.trim(); lnHi=lnHi.trim();
    if(!fn && !fnHi){ showToast('Enter name'); return; }
    let name = ln ? fn+' '+ln : fn, nameHi = fnHi ? (lnHi ? fnHi+' '+lnHi : fnHi) : '';
    
    let bYear = (getEl('f-by')||{}).value||'', dYear = (getEl('f-dy')||{}).value||'';
    let dob = (getEl('f-dob')||{}).value||'', mDate = (getEl('f-mdate')||{}).value||'', phone = (getEl('f-phone')||{}).value||'', address = (getEl('f-address')||{}).value||'';
    let parentId = (getEl('f-par')||{}).value||null, gen = parseInt((getEl('f-gen')||{}).value||'0')||0;
    
    let spN = ((getEl('f-sp')||{}).value||'').trim(), spNHi = ((getEl('f-sp-hi')||{}).value||'').trim();
    let spBy = ((getEl('f-sp-by')||{}).value||'').trim(), spDy = ((getEl('f-sp-dy')||{}).value||'').trim();
    let spDob = ((getEl('f-sp-dob')||{}).value||'').trim(), spPhone = ((getEl('f-sp-phone')||{}).value||'').trim();
    let spAddr = ((getEl('f-sp-address')||{}).value||'').trim();

    async function qTrans(t, l) { 
        if(!GEMINI_API_KEY || GEMINI_API_KEY === 'YOUR_API_KEY_HERE') return ''; 
        try { 
            let u = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + GEMINI_API_KEY;
            let res = await fetch(u, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({contents: [{parts: [{text: `Transliterate into ${l}. Return ONLY the translated name: ${t}`}]}]})});
            let d = await res.json(); 
            return d.candidates ? d.candidates[0].content.parts[0].text.trim() : ''; 
        } catch(e) { return ''; } 
    }
    
    let btn = document.querySelector('.btn-save'); let ob = btn ? btn.textContent : 'Save'; if(btn) btn.disabled = true;
    
    if(name && !nameHi) { if(btn) btn.textContent='Translating...'; nameHi = await qTrans(name, 'Hindi (Devanagari)'); } 
    else if(nameHi && !name) { if(btn) btn.textContent='Translating...'; name = await qTrans(nameHi, 'English (Roman)'); }
    
    if(spN && !spNHi) { if(btn) btn.textContent='Translating...'; spNHi = await qTrans(spN, 'Hindi (Devanagari)'); } 
    else if(spNHi && !spN) { if(btn) btn.textContent='Translating...'; spN = await qTrans(spNHi, 'English (Roman)'); }
    
    if(btn) { btn.textContent = ob; btn.disabled = false; } 
    if(!name) name = nameHi; if(!nameHi) nameHi = name;

    // FIX: Do NOT include `spouse` or `isSpouse` in pD to prevent overwriting the DB link!
    let pD = { name, nameHi, photo: state.prevPhoto, parentId, generation: gen, birthYear: bYear.trim(), deathYear: dYear.trim(), dob: dob.trim(), marriageDate: mDate.trim(), phone: phone.trim(), address: address.trim(), gallery: state.prevGallery };
    
    if(state.editingId === '__new__') {
      pD.id = 'm' + Date.now(); 
      pD.spouse = ''; 
      pD.isSpouse = false;
      state.members.push(pD);
      
      if(spN || spNHi) { 
          let sid = pD.id + 's'; pD.spouse = sid; 
          state.members.push({ id: sid, name: spN, nameHi: spNHi, photo: state.prevPhotoSpouse, parentId: null, generation: gen, spouse: pD.id, isSpouse: true, birthYear: spBy, deathYear: spDy, dob: spDob, phone: spPhone, address: spAddr }); 
      }
      state.editingId = pD.id;
    } else {
      let m = state.members.find(x => x && x.id === state.editingId);
      if(m) { 
        Object.assign(m, pD); // Safely merges without destroying m.spouse!
        if(spN || spNHi) {
          if(m.spouse) { 
              let sp = state.members.find(x => x && x.id === m.spouse); 
              if(sp) { 
                  sp.name = spN; sp.nameHi = spNHi; sp.photo = state.prevPhotoSpouse; 
                  sp.birthYear = spBy; sp.deathYear = spDy; sp.dob = spDob; sp.phone = spPhone; sp.address = spAddr;
              } 
          } else { 
              let sid = m.id + 's'; m.spouse = sid; 
              state.members.push({ id: sid, name: spN, nameHi: spNHi, photo: state.prevPhotoSpouse, parentId: null, generation: gen, spouse: m.id, isSpouse: true, birthYear: spBy, deathYear: spDy, dob: spDob, phone: spPhone, address: spAddr }); 
          }
        } else if(m.spouse) { 
            state.members = state.members.filter(x => x && x.id !== m.spouse); m.spouse = ''; 
        }
      }
    }
    saveToFirebase(); showToast(s('sved')); renderAdmin(); renderTree();
  }

  function delMember(id) {
    if(!isAdmin()) return; 
    let m = state.members.find(x => x && x.id === id);
    if(m && m.spouse) { state.members = state.members.filter(x => x && x.id !== m.spouse); delete state.expanded[m.spouse]; }
    state.members.filter(x => x && x.parentId === id).forEach(c => c.parentId = null); 
    state.members = state.members.filter(x => x && x.id !== id);
    delete state.expanded[id]; state.editingId = null; 
    saveToFirebase(); showToast(s('dlted')); renderAdmin(); renderTree();
  }
